<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestor de tareas</title>
<style>
  :root{
    --bg:#F6F4EF; --panel:#FFFFFF; --ink:#22201C; --ink-soft:#6B655C; --line:#E4DFD4;
    --alta:#B8154F; --alta-bg:#FBE6EC; --media:#B8791A; --media-bg:#FCEFDB;
    --baja:#2F7A55; --baja-bg:#E3F1E9; --accent:#1E4C7A;
    --area-bg:#EFEAE0; --area-ink:#4A4438; --proj:#5B3E8C; --proj-bg:#EDE6F7;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:'Iowan Old Style','Georgia',serif; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:1240px;margin:0 auto;padding:24px 18px 60px;}
  h1{font-family:Georgia,'Times New Roman',serif; font-size:26px; margin:0 0 2px;}
  .datebar{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:12.5px; color:var(--ink-soft); margin-bottom:18px; text-transform:uppercase; letter-spacing:0.08em;}

  .viewtabs{display:flex; gap:6px; margin-bottom:16px; font-family:-apple-system,Helvetica,Arial,sans-serif;}
  .viewtabs button{background:#fff; border:1px solid var(--line); color:var(--ink-soft); font-weight:500;}
  .viewtabs button.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  .layout{display:grid; grid-template-columns:300px 1fr; gap:18px;}
  @media (max-width:820px){ .layout{grid-template-columns:1fr;} }

  .panel-box{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px;}
  .panel-box h2, .sect-h{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:11.5px; text-transform:uppercase; letter-spacing:0.09em; color:var(--ink-soft); margin:0 0 10px; font-weight:600;}
  .help{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:12px; color:var(--ink-soft); margin:0 0 8px; line-height:1.4;}

  textarea,input[type=text],input[type=date]{width:100%; font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:14px; border:1px solid var(--line); border-radius:7px; padding:8px 10px; background:#FDFCFA; color:var(--ink);}
  textarea{resize:vertical; min-height:74px;}
  textarea:focus,input:focus,select:focus{outline:2px solid var(--accent); outline-offset:1px;}
  select{width:100%; font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:13.5px; padding:8px 10px; border:1px solid var(--line); border-radius:7px; background:#FDFCFA; color:var(--ink);}

  button{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:13px; font-weight:600; border:none; border-radius:7px; padding:8px 13px; cursor:pointer;}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:hover{background:#163b5e;}
  .btn-primary:disabled{background:#9db4c6; cursor:wait;}
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--ink-soft); color:var(--ink);}
  .btn-small{padding:5px 10px; font-size:12px;}
  .btn-mic{background:#fff; border:1px solid var(--line); border-radius:50%; width:34px; height:34px; padding:0; display:flex; align-items:center; justify-content:center; font-size:15px;}
  .btn-mic.rec{background:var(--alta-bg); border-color:var(--alta); color:var(--alta);}
  .row-flex{display:flex; gap:8px; align-items:flex-start;}
  .row-flex textarea{flex:1;}

  .note-item{border:1px solid var(--line); border-radius:8px; padding:10px; margin-bottom:9px; background:#FDFCFA;}
  .note-item p{margin:0 0 7px; font-size:13.5px; line-height:1.4;}
  .note-meta{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:11px; color:var(--ink-soft); margin-bottom:7px;}
  .note-actions{display:flex; gap:5px; flex-wrap:wrap;}
  .empty{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:12.5px; color:var(--ink-soft); font-style:italic;}

  .kanban{display:grid; grid-template-columns:repeat(auto-fit,minmax(215px,1fr)); gap:12px; align-items:start;}
  .kcol{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px; min-height:100px;}
  .kcol h3{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:12px; text-transform:uppercase; letter-spacing:0.07em; margin:0 0 10px; font-weight:700; display:flex; justify-content:space-between; align-items:center;}
  .kcol.urgente h3{color:var(--alta);}
  .kcol .count{font-size:11px; background:var(--area-bg); color:var(--area-ink); border-radius:12px; padding:1px 8px; font-weight:600;}
  .kcol.urgente .count{background:var(--alta-bg); color:var(--alta);}

  .task{border:1px solid var(--line); border-left-width:4px; border-radius:8px; padding:10px 11px; margin-bottom:9px; background:#FDFCFA; cursor:pointer;}
  .task:hover{border-color:var(--ink-soft);}
  .task.alta{border-left-color:var(--alta);}
  .task.media{border-left-color:var(--media);}
  .task.baja{border-left-color:var(--baja);}
  .task.done{opacity:0.5;}
  .task-title{font-size:14.5px; font-weight:600; margin:0 0 4px; line-height:1.3;}
  .task-title.done{text-decoration:line-through;}
  .badge{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:2px 7px; border-radius:20px; white-space:nowrap;}
  .badge.alta{background:var(--alta-bg); color:var(--alta);}
  .badge.media{background:var(--media-bg); color:var(--media);}
  .badge.baja{background:var(--baja-bg); color:var(--baja);}
  .badge.area{background:var(--area-bg); color:var(--area-ink); font-weight:600;}
  .badge.tipo{background:#E4EEF6; color:var(--accent); font-weight:600;}
  .badge.proj{background:var(--proj-bg); color:var(--proj); font-weight:600;}
  .badges-row{display:flex; gap:4px; flex-wrap:wrap; margin-top:6px;}
  .task-meta{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:11.5px; color:var(--ink-soft); margin-top:6px;}
  .overdue{color:var(--alta); font-weight:700;}
  .subprogress{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:11px; color:var(--ink-soft); margin-top:5px;}
  .badge.link{background:#E8EDF5; color:#1E4C7A; font-weight:600;}
  .linked-incoming{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:12px; color:var(--ink-soft); margin-bottom:7px; padding:6px 9px; background:#F0F4F8; border-radius:6px; border-left:3px solid #1E4C7A;}

  .filters{display:flex; gap:5px; font-family:-apple-system,Helvetica,Arial,sans-serif; flex-wrap:wrap; margin-bottom:8px;}
  .filters button{background:#fff; border:1px solid var(--line); color:var(--ink-soft); font-weight:500;}
  .filters button.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  .filter-label{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); margin-right:4px; align-self:center;}

  .proj-list-card{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:12px; cursor:pointer;}
  .proj-list-card:hover{border-color:var(--proj);}
  .proj-list-card h3{font-family:Georgia,serif; font-size:17px; margin:0 0 5px;}
  .proj-list-card .proj-meta{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:12px; color:var(--ink-soft);}
  .proj-add{display:flex; gap:6px; margin-bottom:14px;}
  .proj-add input{flex:1;}

  .proj-head{background:var(--panel); border:1px solid var(--line); border-left:5px solid var(--proj); border-radius:10px; padding:16px; margin-bottom:14px;}
  .proj-head h3{font-family:Georgia,serif; font-size:20px; margin:0 0 6px; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; align-items:center;}
  .log-entry{border-bottom:1px dashed var(--line); padding:9px 0;}
  .log-entry:last-child{border-bottom:none;}
  .log-date{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--proj); font-weight:700; margin-bottom:3px; display:flex; justify-content:space-between; align-items:center;}
  .log-text{font-size:14px; line-height:1.45; white-space:pre-wrap;}

  .modal-bg{position:fixed; inset:0; background:rgba(30,28,24,0.45); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; overflow-y:auto;}
  .modal{background:#fff; border-radius:12px; padding:20px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto;}
  .modal h3{margin:0 0 6px; font-family:Georgia,serif; font-size:18px;}
  .field{margin-bottom:11px;}
  .field label{display:block; font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); margin-bottom:4px; font-weight:600;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:14px; flex-wrap:wrap;}
  .checks{display:flex; flex-wrap:wrap; gap:5px;}
  .chk{display:flex; align-items:center; gap:5px; font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:12px; border:1px solid var(--line); border-radius:20px; padding:4px 9px; background:#FDFCFA; cursor:pointer;}
  .chk input{margin:0;}
  .chk.checked{background:var(--area-bg); border-color:var(--area-ink);}

  .sub-list{margin:0 0 8px; padding:0; list-style:none;}
  .sub-list li{display:flex; align-items:center; gap:7px; font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:13px; padding:4px 0; border-bottom:1px dashed var(--line);}
  .sub-list li span.done{text-decoration:line-through; color:var(--ink-soft);}
  .sub-list li button{margin-left:auto;}
  .sub-add{display:flex; gap:6px;}
  .sub-add input{flex:1;}

  .area-manage{display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px;}
  .area-chip{display:flex; align-items:center; gap:5px; font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:11.5px; background:var(--area-bg); color:var(--area-ink); border-radius:20px; padding:4px 5px 4px 9px;}
  .area-chip button{background:none; border:none; color:var(--area-ink); font-weight:700; padding:0 4px; cursor:pointer; font-size:13px; line-height:1;}
  .area-add{display:flex; gap:6px;}
  .area-add input{flex:1;}
  details.manage summary{cursor:pointer; font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:12px; color:var(--ink-soft); margin-bottom:8px;}
  details.manage{margin-bottom:12px;}

  .status-msg{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:12px; color:var(--ink-soft); margin-top:12px; min-height:16px;}

  .app-header{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; gap:12px;}
  .notes-btn{white-space:nowrap; margin-top:4px; display:flex; align-items:center; gap:6px;}
  .notes-btn-badge{background:#B8154F; color:#fff; border-radius:10px; padding:1px 8px; font-size:11px; font-weight:700;}

  .drawer-overlay{display:none; position:fixed; inset:0; background:rgba(30,28,24,0.35); z-index:40;}
  .drawer-overlay.open{display:block;}
  .drawer{position:fixed; top:0; right:0; bottom:0; width:400px; max-width:95vw; background:#fff; border-left:1px solid var(--line); box-shadow:-4px 0 24px rgba(0,0,0,0.10); z-index:45; transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; overflow:hidden;}
  .drawer.open{transform:translateX(0);}
  .drawer-head{display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-bottom:1px solid var(--line); background:#fff; flex-shrink:0;}
  .drawer-head h3{margin:0; font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-soft);}
  .drawer-body{padding:18px 20px; overflow-y:auto; flex:1;}
  .cfg-sect{font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); margin:18px 0 8px; padding-bottom:5px; border-bottom:1px solid var(--line);}
  .cfg-sect:first-child{margin-top:0;}
  .cfg-actions{display:flex; flex-direction:column; gap:8px;}
  .header-btns{display:flex; gap:8px; align-items:flex-start; margin-top:4px;}
  .cfg-fields{display:flex; flex-direction:column; gap:7px;}
  .cfg-fields label{font-size:11.5px; font-weight:600; color:var(--ink-soft); font-family:-apple-system,Helvetica,Arial,sans-serif; margin-top:4px;}
  .cfg-fields input{font-size:13px; padding:5px 9px; border:1px solid var(--line); border-radius:5px; font-family:-apple-system,Helvetica,Arial,sans-serif; background:#fff; width:100%;}
  .cfg-fields input:focus{outline:none; border-color:#1E4C7A;}
  .area-edit-row{display:flex; align-items:center; gap:6px; margin-bottom:5px;}
  .area-edit-input{flex:1; font-size:13px; padding:4px 8px; border:1px solid var(--line); border-radius:5px; font-family:-apple-system,Helvetica,Arial,sans-serif; background:#fff;}
  .area-edit-input:focus{outline:none; border-color:#1E4C7A;}
  .area-del-btn{flex-shrink:0; background:none; border:none; cursor:pointer; color:var(--ink-soft); font-size:15px; line-height:1; padding:2px 4px;}
  /* Google / Agenda */
  .google-connected{font-size:12px; color:#166534; background:#f0fdf4; padding:6px 10px; border-radius:6px; border:1px solid #bbf7d0; margin-bottom:6px;}
  .agenda-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media(max-width:700px){.agenda-grid{grid-template-columns:1fr;}}
  .agenda-sect-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .agenda-sect-head h2{margin:0; font-size:13px; font-weight:700; font-family:-apple-system,Helvetica,Arial,sans-serif; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-soft);}
  .agenda-day{margin-bottom:14px;}
  .agenda-day-label{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-soft); margin-bottom:6px; padding-bottom:3px; border-bottom:1px solid var(--line); font-family:-apple-system,Helvetica,Arial,sans-serif;}
  .agenda-event{display:flex; gap:9px; align-items:flex-start; padding:6px 9px; background:#fff; border:1px solid var(--line); border-radius:6px; margin-bottom:4px;}
  .agenda-event-time{font-size:11.5px; color:var(--ink-soft); white-space:nowrap; min-width:50px; font-family:-apple-system,Helvetica,Arial,sans-serif;}
  .agenda-event-title{font-size:13px; font-weight:500;}
  .gmail-item{display:flex; gap:9px; align-items:center; padding:7px 9px; background:#fff; border:1px solid var(--line); border-radius:6px; margin-bottom:4px;}
  .gmail-item-info{flex:1; min-width:0;}
  .gmail-item-subject{font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .gmail-item-from{font-size:11px; color:var(--ink-soft); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .agenda-connect{text-align:center; padding:40px 20px;}
  .agenda-connect p{margin-bottom:14px; font-size:14px; color:var(--ink-soft); font-family:-apple-system,Helvetica,Arial,sans-serif;}
</style>
<script src="https://accounts.google.com/gsi/client" async onload="initGoogleTokenClient()"></script>
</head>
<body>
<div class="wrap">
  <div class="app-header">
    <div>
      <h1 id="appTitle">Gestor de tareas</h1>
      <div class="datebar" id="datebar"></div>
    </div>
    <div class="header-btns">
      <button class="btn-ghost btn-small notes-btn" onclick="openNotesDrawer()">
        📝 Notas <span id="notesCountBadge" style="display:none;" class="notes-btn-badge">0</span>
      </button>
      <button class="btn-ghost btn-small notes-btn" onclick="openConfigDrawer()">⚙️ Configuración</button>
    </div>
  </div>

  <div class="viewtabs">
    <button id="tab-panel" class="btn-small active" onclick="setView('panel')">Panel</button>
    <button id="tab-lista" class="btn-small" onclick="setView('lista')">Lista</button>
    <button id="tab-proyectos" class="btn-small" onclick="setView('proyectos')">Proyectos</button>
    <button id="tab-reuniones" class="btn-small" onclick="setView('reuniones')">Reuniones</button>
    <button id="tab-crm" class="btn-small" onclick="setView('crm')">CRM</button>
    <button id="tab-desarrollo" class="btn-small" onclick="setView('desarrollo')">Desarrollo</button>
    <button id="tab-agenda" class="btn-small" onclick="setView('agenda')">📅 Agenda</button>
  </div>

  <div id="viewRoot"></div>

  <div style="margin-top:12px;">
    <button class="btn-ghost btn-small" onclick="openTaskModal(null)">+ Añadir tarea</button>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importBackup(this)">
  <div class="status-msg" id="statusMsg"></div>
</div>

<!-- Overlay compartido -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeAllDrawers()"></div>

<!-- Drawer de notas -->
<div class="drawer" id="notesDrawer">
  <div class="drawer-head">
    <h3>📝 Notas sin procesar</h3>
    <button class="btn-ghost btn-small" onclick="closeNotesDrawer()">Cerrar ×</button>
  </div>
  <div class="drawer-body">
    <p class="panel-box h2" style="font-family:-apple-system,Helvetica,Arial,sans-serif; font-size:11.5px; text-transform:uppercase; letter-spacing:0.09em; color:var(--ink-soft); margin:0 0 10px; font-weight:600;">Captura rápida</p>
    <div class="row-flex">
      <textarea id="noteInput" placeholder="Escribe o dicta →" style="min-height:80px;"></textarea>
      <button class="btn-mic" id="micNote" onclick="startDictation('noteInput','micNote')" title="Dictar nota">🎙️</button>
    </div>
    <div style="margin-top:9px; display:flex; justify-content:flex-end;">
      <button class="btn-primary btn-small" onclick="saveNote()">Guardar nota</button>
    </div>
    <hr style="border:none; border-top:1px solid var(--line); margin:20px 0 14px;">
    <div id="notesList"></div>
  </div>
</div>

<!-- Drawer de configuración -->
<div class="drawer" id="configDrawer">
  <div class="drawer-head">
    <h3>⚙️ Configuración</h3>
    <button class="btn-ghost btn-small" onclick="closeConfigDrawer()">Cerrar ×</button>
  </div>
  <div class="drawer-body">
    <p class="cfg-sect">Perfil</p>
    <div class="cfg-fields">
      <label>Nombre</label>
      <input type="text" id="cfgNombre" placeholder="José Carlos">
      <label>Apellidos</label>
      <input type="text" id="cfgApellidos" placeholder="Alonso Marcos">
      <label>Alias / nombre corto</label>
      <input type="text" id="cfgAlias" placeholder="JC">
      <label>Cargo</label>
      <input type="text" id="cfgCargo" placeholder="Director de Fundación">
      <label>Correo electrónico</label>
      <input type="email" id="cfgEmail" placeholder="jalom@unileon.es">
    </div>
    <div style="margin-top:10px; display:flex; justify-content:flex-end;">
      <button class="btn-primary btn-small" onclick="saveProfile()">Guardar perfil</button>
    </div>

    <p class="cfg-sect">Google</p>
    <div id="googleAuthStatus">
      <button class="btn-ghost btn-small" onclick="connectGoogle()">🔗 Conectar con Google</button>
    </div>

    <p class="cfg-sect">Datos</p>
    <div class="cfg-actions">
      <button class="btn-ghost btn-small" onclick="copySummary()">Copiar resumen de pendientes</button>
      <button class="btn-ghost btn-small" onclick="copyBackupToClipboard()">Ver copia de seguridad</button>
      <button class="btn-ghost btn-small" onclick="document.getElementById('importFile').click()">Importar copia (archivo)</button>
      <button class="btn-ghost btn-small" onclick="openPasteImportModal()">Importar copia (pegar texto)</button>
    </div>

    <p class="cfg-sect">Áreas</p>
    <div class="area-manage" id="areaManageList"></div>
    <div class="area-add" style="margin-top:8px;">
      <input type="text" id="newAreaInput" placeholder="Nueva área...">
      <button class="btn-ghost btn-small" onclick="addArea()">Añadir</button>
    </div>

    <p class="cfg-sect">Tipos de tarea</p>
    <p class="help" style="margin-bottom:8px;">Cada tipo es una columna del Panel; mantenlos pocos</p>
    <div class="area-manage" id="tipoManageList"></div>
    <div class="area-add" style="margin-top:8px;">
      <input type="text" id="newTipoInput" placeholder="Nuevo tipo...">
      <button class="btn-ghost btn-small" onclick="addTipo()">Añadir</button>
    </div>
  </div>
</div>

<div id="modalRoot"></div>

<script>
const STORAGE_KEY = 'tablero-fgulem-datos';
const SUPABASE_URL = 'https://awnitqzydpqvbjxqgjfk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3cqXbZ0mntG4tGgqzVA3JQ_xNWHlmbJ';
const DEFAULT_AREAS = ['Desarrollo profesional','Formación y congresos','Transferencia e innovación','Encargos de gestión','Desarrollo digital','Servicios generales','Dirección / Transversal'];
const DEFAULT_TIPOS = ['Correo pendiente','Llamada','Reunión por montar','Tema general'];
const DEFAULT_PROFILE = { nombre:'', apellidos:'', alias:'', email:'', cargo:'' };
let state = { notes:[], tasks:[], areas:DEFAULT_AREAS.slice(), tipos:DEFAULT_TIPOS.slice(), projects:[], meetings:[], contacts:[], profile:{...DEFAULT_PROFILE} };
let currentPersonFilter = null;
let tempParticipants = [];
let meetingDraftStash = null;
let currentView = 'panel';
let currentProjectId = null;
let currentUrgFilter = 'todas';
let expandedSubtasks = new Set();
let currentAreaFilter = 'todas';
let currentTipoFilter = 'todas';
let tempSubtasks = [];
let tempExpectedParticipants = [];
let tempLinkedTaskIds = [];

const monthsEs = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function fmtDate(d){ const dt=new Date(d+'T00:00:00'); return dt.getDate()+' de '+monthsEs[dt.getMonth()]+' de '+dt.getFullYear(); }
function fmtDateShort(d){ const dt=new Date(d+'T00:00:00'); return dt.getDate()+' de '+monthsEs[dt.getMonth()]; }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
document.getElementById('datebar').textContent = new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function setStatus(msg){
  const el=document.getElementById('statusMsg'); el.textContent=msg;
  if(msg) setTimeout(()=>{ if(el.textContent===msg) el.textContent=''; },3500);
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function escapeHtml(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escapeAttr(s){ return escapeHtml(s).replace(/"/g,'&quot;'); }
function getProj(id){ return state.projects.find(x=>x.id===id) || null; }
function projName(id){ const p=getProj(id); return p?p.name:null; }

async function fetchTable(table, orderDir){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=data&order=id.${orderDir}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const rows = await res.json();
  return rows.map(r=>r.data);
}
async function upsertRow(table, id, data){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify([{ id, data, updated_at: new Date().toISOString() }])
  });
  if(!res.ok) setStatus('No se pudo guardar (HTTP '+res.status+'). Reintenta.');
}
async function deleteRow(table, id){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) setStatus('No se pudo borrar (HTTP '+res.status+'). Reintenta.');
}
function saveTaskRow(t){ return upsertRow('tasks', t.id, t); }
function deleteTaskRow(id){ return deleteRow('tasks', id); }
function saveProjectRow(p){ return upsertRow('projects', p.id, p); }
function deleteProjectRow(id){ return deleteRow('projects', id); }
function saveMeetingRow(m){ return upsertRow('meetings', m.id, m); }
function deleteMeetingRow(id){ return deleteRow('meetings', id); }
function saveContactRow(c){ return upsertRow('contacts', c.id, c); }
function deleteContactRow(id){ return deleteRow('contacts', id); }
function saveNoteRow(n){ return upsertRow('notes', n.id, n); }
function deleteNoteRow(id){ return deleteRow('notes', id); }
function saveSettings(){ return upsertRow('board', STORAGE_KEY, { areas: state.areas, tipos: state.tipos, profile: state.profile }); }

async function loadState(){
  setStatus('Cargando...');
  try{
    const [tasks, projects, meetings, contacts, notes, boardRes] = await Promise.all([
      fetchTable('tasks','desc'),
      fetchTable('projects','asc'),
      fetchTable('meetings','desc'),
      fetchTable('contacts','asc'),
      fetchTable('notes','desc'),
      fetch(`${SUPABASE_URL}/rest/v1/board?id=eq.${STORAGE_KEY}&select=data`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      }).then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    ]);
    const settings = (boardRes && boardRes.length && boardRes[0].data) ? boardRes[0].data : {};
    state = {
      tasks, projects, meetings, contacts, notes,
      areas: (settings.areas && settings.areas.length) ? settings.areas : DEFAULT_AREAS.slice(),
      tipos: (settings.tipos && settings.tipos.length) ? settings.tipos : DEFAULT_TIPOS.slice(),
      profile: settings.profile || {...DEFAULT_PROFILE}
    };
    state.tasks.forEach(t=>{ if(!t.subtasks) t.subtasks=[]; t.subtasks.forEach(s=>{ if(!s.children) s.children=[]; }); if(!t.linkedTaskIds) t.linkedTaskIds=[]; });
    state.projects.forEach(p=>{ if(!p.areas) p.areas=[]; if(!p.log) p.log=[]; if(p.active===undefined) p.active=true; });
    setStatus('');
  }catch(e){
    setStatus('Error al cargar los datos.');
  }
  updateAppTitle();
  render();
}

}

function addTipo(){

  if(!val) return;
  if(state.tipos.includes(val)){ setStatus('Ese tipo ya existe.'); return; }

}

  state.tipos=state.tipos.filter(t=>t!==name);

        <p style="font-size:13.5px; margin:0 0 6px;">${escapeHtml(m.title)} — ${fmtDateShort(m.date)}</p>
        <div style="display:flex; gap:6px;">
          <button type="button" class="btn-ghost btn-small" onclick="openLinkedMeeting('${m.id}')">Abrir ficha</button>
          <button type="button" class="btn-ghost btn-small" onclick="unlinkMeeting('${task.id}')">Desvincular</button>

      </div>`;
    }
  }
  return `<div class="field">
    <label>Participantes previstos</label>

    </div>
    <datalist id="contactNamesTask">
      ${state.contacts.map(c=>`<option value="${escapeAttr(contactFullName(c))}">`).join('')}
    </datalist>

    <label>Ficha de reunión vinculada</label>
    <button type="button" class="btn-primary btn-small" onclick="createLinkedMeeting('${task.id}')">Crear ficha de reunión vinculada</button>
    <p class="help" style="margin-top:6px;">Los participantes previstos se trasladan automáticamente a la ficha al crearla.</p>
  </div>`;
}
function renderExpectedParticipants(){
  const el=document.getElementById('mExpPartList'); if(!el) return;
  el.innerHTML = tempExpectedParticipants.map((p,i)=>`
    <li>
      <span>${escapeHtml(p)}</span>
      <button type="button" class="btn-ghost btn-small" onclick="tempExpectedParticipants.splice(${i},1); renderExpectedParticipants();">×</button>
    </li>`).join('') || '<li style="border:none;"><span class="empty">Sin participantes previstos todavía.</span></li>';
}
function addExpectedParticipant(){
  const input=document.getElementById('mExpPartInput'); const val=input.value.trim();
  if(!val) return;
  if(!tempExpectedParticipants.includes(val)) tempExpectedParticipants.push(val);
  input.value=''; renderExpectedParticipants();
}
function createLinkedMeeting(taskId){
  const t = state.tasks.find(x=>x.id===taskId);
  if(!t) return;
  const m = {id:uid(), title:t.title, date:todayStr(), importance:t.urgency||'media', participants:(t.expectedParticipants||[]).slice(), summary:'', acuerdos:'', projectId:t.projectId||null};
  state.meetings.unshift(m);
  t.meetingId = m.id;
  saveMeetingRow(m); saveTaskRow(t);
  closeModal();
  openMeetingModal(m.id);
}
function openLinkedMeeting(meetingId){
  closeModal();
  openMeetingModal(meetingId);
}
function unlinkMeeting(taskId){
  const t = state.tasks.find(x=>x.id===taskId);
  if(!t) return;
  t.meetingId = null;
  saveTaskRow(t);
  openTaskModal(taskId);
}

          <select id="mProject">
            <option value="">— Sin proyecto —</option>
            ${state.projects.filter(p=>p.active||p.id===data.projectId).map(p=>`<option value="${p.id}" ${data.projectId===p.id?'selected':''}>${escapeHtml(p.name)}${!p.active?' (archivado)':''}</option>`).join('')}

          <p class="help" style="margin-top:5px;">Si no está en tu CRM, se guarda igual como texto suelto — date de alta al contacto desde la pestaña CRM si quieres que quede fichado.</p>

          <select id="mUrgency">
            <option value="alta" ${data.urgency==='alta'?'selected':''}>Alta</option>
            <option value="media" ${(!data.urgency||data.urgency==='media')?'selected':''}>Media</option>

          </select>

          <label>Fecha límite (opcional)</label>

function renderSubList(){
  const el=document.getElementById('mSubList'); if(!el) return;
  el.innerHTML = tempSubtasks.map((s,i)=>{
    if(!s.children) s.children=[];
    const childrenHtml = s.children.map((c,j)=>`
      <li style="margin-left:22px; border-bottom:none;">
        <input type="checkbox" ${c.done?'checked':''} onchange="tempSubtasks[${i}].children[${j}].done=this.checked; renderSubList();">
        <span class="${c.done?'done':''}">${escapeHtml(c.text)}</span>
        <button class="btn-ghost btn-small" onclick="tempSubtasks[${i}].children.splice(${j},1); renderSubList();">×</button>
      </li>`).join('');
    return `
    <li>
      <input type="checkbox" ${s.done?'checked':''} onchange="tempSubtasks[${i}].done=this.checked; renderSubList();">
      <span class="${s.done?'done':''}">${escapeHtml(s.text)}</span>
      <button class="btn-ghost btn-small" onclick="tempSubtasks.splice(${i},1); renderSubList();">×</button>
    </li>
    ${childrenHtml}
    <li style="margin-left:22px; border-bottom:none;">
      <input type="text" placeholder="+ sub-subtarea..." style="flex:1; border:1px solid var(--line); border-radius:5px; padding:3px 6px; font-size:12px;"
        onkeydown="if(event.key==='Enter'){event.preventDefault(); if(this.value.trim()){ tempSubtasks[${i}].children.push({id:uid(),text:this.value.trim(),done:false}); this.value=''; renderSubList(); } }">
    </li>`;
  }).join('') || '<li style="border:none;"><span class="empty">Sin subtareas.</span></li>';
}
function addSubtask(){
  const input=document.getElementById('mSubInput'); const val=input.value.trim();
  if(!val) return;
  tempSubtasks.push({id:uid(), text:val, done:false, children:[]});
  input.value=''; renderSubList();
}
function renderLinkedTasksList(){
  const listEl=document.getElementById('mLinkedList'); if(!listEl) return;
  const editId=listEl.dataset.editid;
  listEl.innerHTML=tempLinkedTaskIds.map((id,i)=>{
    const lt=state.tasks.find(x=>x.id===id);
    return `<li>
      <span>${escapeHtml(lt?lt.title:'(tarea eliminada)')}</span>
      <button type="button" class="btn-ghost btn-small" onclick="tempLinkedTaskIds.splice(${i},1);renderLinkedTasksList();">× Quitar</button>
    </li>`;
  }).join('')||'<li style="border:none;"><span class="empty">Sin tareas vinculadas todavía.</span></li>';
  const sel=document.getElementById('mLinkedSelect'); if(!sel) return;
  const prev=sel.value;
  sel.innerHTML='<option value="">— Seleccionar tarea para vincular —</option>'+
    state.tasks.filter(x=>x.id!==editId&&!tempLinkedTaskIds.includes(x.id))
      .map(x=>`<option value="${x.id}"${x.id===prev?' selected':''}>${escapeHtml(x.title)}</option>`).join('');
}
// ---- Dictado por voz ----
let _dictRec = null;
function startDictation(targetId, btnId){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ setStatus('El dictado no está disponible en este navegador. Prueba con Chrome.'); return; }
  if(_dictRec){ _dictRec.stop(); return; }
  const btn = document.getElementById(btnId);
  _dictRec = new SR();
  _dictRec.lang = 'es-ES';
  _dictRec.continuous = true;
  _dictRec.interimResults = false;
  _dictRec.onstart = ()=>{ if(btn) btn.classList.add('rec'); setStatus('Dictando… pulsa el micrófono para detener.'); };
  _dictRec.onresult = e=>{
    const el = document.getElementById(targetId); if(!el) return;
    let txt = '';
    for(let i=e.resultIndex;i<e.results.length;i++) if(e.results[i].isFinal) txt+=e.results[i][0].transcript;
    if(txt){ const sep=el.value&&!/\s$/.test(el.value)?' ':''; el.value+=sep+txt; }
  };
  _dictRec.onerror = e=>{ if(e.error!=='aborted') setStatus('Error de micrófono: '+e.error); };
  _dictRec.onend = ()=>{ if(btn) btn.classList.remove('rec'); _dictRec=null; setStatus(''); };
  _dictRec.start();
}

function addLinkedTaskTemp(){
  const sel=document.getElementById('mLinkedSelect'); if(!sel||!sel.value) return;
  if(!tempLinkedTaskIds.includes(sel.value)) tempLinkedTaskIds.push(sel.value);
  renderLinkedTasksList();
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; tempSubtasks=[]; tempLinkedTaskIds=[]; }

function saveTask(taskId, fromNoteId){
  const title=document.getElementById('mTitle').value.trim();
  if(!title){ setStatus('El título no puede estar vacío.'); return; }
  const areas=Array.from(document.querySelectorAll('#mAreas input:checked')).map(el=>el.value);
  const projectId=document.getElementById('mProject').value || null;
  const tipo=document.getElementById('mTipo').value;
  const urgency=document.getElementById('mUrgency').value;
  const due=document.getElementById('mDue').value;
  const context=document.getElementById('mContext').value.trim();
  const subtasks=JSON.parse(JSON.stringify(tempSubtasks));
  const expectedParticipants=tempExpectedParticipants.slice();
  const callWith=document.getElementById('mCallWith').value.trim();

  const linkedTaskIds=tempLinkedTaskIds.slice();
  let t;
  if(taskId){
    t=state.tasks.find(x=>x.id===taskId);
    Object.assign(t,{title,areas,projectId,tipo,urgency,due,context,subtasks,expectedParticipants,callWith,linkedTaskIds});
  } else {
    t={id:uid(),title,areas,projectId,tipo,urgency,due,context,subtasks,expectedParticipants,callWith,linkedTaskIds,status:'pendiente',created:todayStr()};
    state.tasks.unshift(t);
  }
  if(fromNoteId){ state.notes=state.notes.filter(n=>n.id!==fromNoteId); deleteNoteRow(fromNoteId); }
  saveTaskRow(t);
  closeModal(); render();
  setStatus('Tarea guardada.');
}
function toggleSubtasksExpand(id,ev){
  if(ev) ev.stopPropagation();
  if(expandedSubtasks.has(id)) expandedSubtasks.delete(id); else expandedSubtasks.add(id);
  render();
}
function toggleSubtaskInline(taskId, subId){
  const t=state.tasks.find(x=>x.id===taskId); if(!t) return;
  const s=t.subtasks.find(x=>x.id===subId); if(!s) return;
  s.done = !s.done;
  saveTaskRow(t); render();
}
function toggleChildSubtaskInline(taskId, subId, childId){
  const t=state.tasks.find(x=>x.id===taskId); if(!t) return;
  const s=t.subtasks.find(x=>x.id===subId); if(!s || !s.children) return;
  const c=s.children.find(x=>x.id===childId); if(!c) return;
  c.done = !c.done;
  saveTaskRow(t); render();
}
function cycleUrgency(id,ev){
  if(ev) ev.stopPropagation();
  const t=state.tasks.find(x=>x.id===id);
  const order=['alta','media','baja'];
  t.urgency = order[(order.indexOf(t.urgency)+1)%3];
  saveTaskRow(t); render();
}
function toggleDone(id,ev){
  if(ev) ev.stopPropagation();
  const t=state.tasks.find(x=>x.id===id);
  t.status = t.status==='hecha'?'pendiente':'hecha';
  saveTaskRow(t); render();
}
function deleteTask(id,ev){
  if(ev) ev.stopPropagation();
  state.tasks=state.tasks.filter(t=>t.id!==id);
  deleteTaskRow(id); render();
}

function saveContact(contactId){

function restoreMeetingDraft(){

function renderCRM(){

  const callCount = {};
  state.tasks.forEach(t=>{ if(t.tipo==='Llamada' && t.callWith) callCount[t.callWith]=(callCount[t.callWith]||0)+1; });

    return `

function copyBackupToClipboard(){
  const payload = JSON.stringify({exportedAt:new Date().toISOString(), version:STORAGE_KEY, data:state}, null, 2);
  const root=document.getElementById('modalRoot');
  root.innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this) closeModal()">

        <h3>Copia de seguridad (selecciona y copia)</h3>
        <p class="help">El texto ya está seleccionado. Pulsa Ctrl+C (o el gesto de copiar de tu dispositivo) y pégalo donde quieras guardarlo.</p>
        <textarea id="backupOutput" readonly style="min-height:220px; font-family:monospace; font-size:11px;">${escapeHtml(payload)}</textarea>
        <div class="modal-actions">
          <button class="btn-ghost" onclick="closeModal()">Cerrar</button>
        </div>
      </div>
    </div>`;
  const ta=document.getElementById('backupOutput');
  ta.focus(); ta.select();
}
function importBackup(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    restoreFromJSONText(reader.result);
    input.value='';
  };
  reader.readAsText(file);
}
function restoreFromJSONText(text){
  let data;
  try{
    const parsed = JSON.parse(text);
    data = parsed.data || parsed;
    if(!data.tasks || !Array.isArray(data.tasks)) throw new Error('Formato no reconocido');
  }catch(e){
    setStatus('El texto pegado no es una copia válida del gestor de tareas.');
    return;
  }
  showConfirm('Esto SUSTITUYE todo lo que hay ahora en el gestor de tareas por el contenido de la copia. ¿Continuar?', ()=>{
    state = Object.assign({notes:[],tasks:[],areas:DEFAULT_AREAS.slice(),tipos:DEFAULT_TIPOS.slice(),projects:[],meetings:[],contacts:[]}, data);
    state.tasks.forEach(t=>{ if(!t.subtasks) t.subtasks=[]; t.subtasks.forEach(s=>{ if(!s.children) s.children=[]; }); if(!t.linkedTaskIds) t.linkedTaskIds=[]; });
    state.projects.forEach(p=>{ if(!p.areas) p.areas=[]; if(!p.log) p.log=[]; if(p.active===undefined) p.active=true; });
    persistAll(); render();
    setStatus('Copia restaurada.');
  });
}
async function deleteAllRows(table){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=not.is.null`, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) setStatus('No se pudo limpiar una tabla antes de restaurar (HTTP '+res.status+').');
}
async function persistAll(){
  await Promise.all(['tasks','projects','meetings','contacts','notes'].map(deleteAllRows));
  await Promise.all([
    ...state.tasks.map(saveTaskRow),
    ...state.projects.map(saveProjectRow),
    ...state.meetings.map(saveMeetingRow),
    ...state.contacts.map(saveContactRow),
    ...state.notes.map(saveNoteRow),
    saveSettings()
  ]);
}

      <div class="modal">
        <h3>Importar copia pegando texto</h3>

        <div class="modal-actions">
          <button class="btn-ghost" onclick="closeModal()">Cancelar</button>

}

// ---- Resumen ----
function copySummary(){
  const pending=state.tasks.filter(t=>t.status!=='hecha');
  const order={alta:0,media:1,baja:2};
  pending.sort((a,b)=>order[a.urgency]-order[b.urgency]||(a.due||'9999').localeCompare(b.due||'9999'));
  let text='Pendientes ('+new Date().toLocaleDateString('es-ES')+'):\n';
  pending.forEach(t=>{
    const areas=(t.areas||[]).join(', ');
    const pn=projName(t.projectId);
    text+='- ['+t.urgency.toUpperCase()+'] '+t.title+(t.tipo?' ('+t.tipo+')':'')+(pn?' — Proyecto: '+pn:'')+(areas?' — '+areas:'')+(t.due?' — vence '+fmtDateShort(t.due):'');
    if(t.subtasks && t.subtasks.length){
      const done=t.subtasks.filter(s=>s.done).length;
      text+=' — subtareas '+done+'/'+t.subtasks.length;
      t.subtasks.forEach(s=>{ text+='\n    '+(s.done?'[x] ':'[ ] ')+s.text; });
    }
    if(t.context) text+='\n    '+t.context.replace(/\n/g,'\n    ');
    text+='\n';
  });
  if(pending.length===0) text+='(nada pendiente)';

const GOOGLE_CLIENT_ID = '1043299015570-mi3k1ecnrvle83qfjl186kuucmn4bnd7.apps.googleusercontent.com';
const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/gmail.readonly';
let googleToken = null;
let googleTokenExpiry = 0;
let gTokenClient = null;

function initGoogleTokenClient(){
  if(typeof google === 'undefined' || !google.accounts) return;
  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPES,
    callback: (resp) => {
      if(resp.error){ setStatus('Error Google: '+resp.error); return; }
      googleToken = resp.access_token;
      googleTokenExpiry = Date.now() + (resp.expires_in - 60)*1000;
      sessionStorage.setItem('g_tok', JSON.stringify({t:googleToken, e:googleTokenExpiry}));
      updateGoogleUI();
      if(currentView==='agenda') loadAgendaData();
      setStatus('Conectado con Google ✓');
    }
  });
  try{
    const s=JSON.parse(sessionStorage.getItem('g_tok')||'null');
    if(s && s.e > Date.now()){ googleToken=s.t; googleTokenExpiry=s.e; updateGoogleUI(); }
  }catch(e){}
}
function connectGoogle(){
  if(!gTokenClient) initGoogleTokenClient();
  if(!gTokenClient){ setStatus('Librería de Google no cargada aún. Reintenta en un momento.'); return; }
  gTokenClient.requestAccessToken({prompt: googleToken?'':'consent'});
}
function disconnectGoogle(){
  if(googleToken) try{ google.accounts.oauth2.revoke(googleToken,()=>{}); }catch(e){}
  googleToken=null; googleTokenExpiry=0;
  sessionStorage.removeItem('g_tok');
  updateGoogleUI();
  if(currentView==='agenda') render();
}
function updateGoogleUI(){
  const el=document.getElementById('googleAuthStatus'); if(!el) return;
  if(googleToken){
    el.innerHTML=`<p class="google-connected">✓ Conectado con Google</p>
      <button class="btn-ghost btn-small" style="margin-top:6px;" onclick="disconnectGoogle()">Desconectar</button>`;
  } else {
    el.innerHTML=`<button class="btn-ghost btn-small" onclick="connectGoogle()">🔗 Conectar con Google</button>`;
  }
}
function handleGoogleExpired(){
  googleToken=null; sessionStorage.removeItem('g_tok'); updateGoogleUI();
  setStatus('Sesión de Google expirada — vuelve a conectar.');
}

async function loadCalendarWidget(){
  const el=document.getElementById('calendarWidget'); if(!el) return;
  el.innerHTML='<p class="empty">Cargando...</p>';
  const events=await fetchCalendarEvents();
  if(!events.length){ el.innerHTML='<p class="empty">Sin eventos en los próximos 7 días.</p>'; return; }
  const byDay={};
  events.forEach(ev=>{
    const key=ev.start.dateTime?ev.start.dateTime.slice(0,10):ev.start.date;
    if(!byDay[key]) byDay[key]=[];
    byDay[key].push(ev);
  });
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  el.innerHTML=Object.entries(byDay).map(([date,evs])=>{
    const d=new Date(date+'T12:00:00');
    const label=date===todayStr()?'Hoy':(dias[d.getDay()]+' '+d.getDate()+' '+monthsEs[d.getMonth()]);
    return `<div class="agenda-day">
      <div class="agenda-day-label">${label}</div>
      ${evs.map(ev=>{
        const t=ev.start.dateTime?new Date(ev.start.dateTime).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):'Todo el día';
        const dot=ev._calColor?`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${ev._calColor};flex-shrink:0;margin-top:3px;"></span>`:'';
        return `<div class="agenda-event">
          <span class="agenda-event-time">${t}</span>
          ${dot}
          <span class="agenda-event-title">${escapeHtml(ev.summary||'(sin título)')}<br><span style="font-size:11px;color:var(--ink-soft);font-family:-apple-system,Helvetica,Arial,sans-serif;">${escapeHtml(ev._calName||'')}</span></span>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}
async function fetchCalendarEvents(){
  if(!googleToken) return [];
  const now=new Date().toISOString();
  const end=new Date(Date.now()+7*24*60*60*1000).toISOString();
  try{
    // 1. Obtener todos los calendarios
    const calRes=await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList?maxResults=50',
      {headers:{Authorization:`Bearer ${googleToken}`}});
    if(calRes.status===401){handleGoogleExpired();return[];}
    if(!calRes.ok) return[];
    const cals=((await calRes.json()).items||[]).filter(c=>c.selected!==false);
    // 2. Obtener eventos de todos los calendarios en paralelo
    const results=await Promise.all(cals.map(cal=>
      fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${encodeURIComponent(now)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime&maxResults=20`,
        {headers:{Authorization:`Bearer ${googleToken}`}})
      .then(r=>r.ok?r.json():{items:[]})
      .then(d=>(d.items||[]).map(ev=>({...ev, _calName:cal.summary, _calColor:cal.backgroundColor})))
      .catch(()=>[])
    ));
    // 3. Unir y ordenar por hora de inicio
    return results.flat().sort((a,b)=>{
      const ta=a.start.dateTime||a.start.date;
      const tb=b.start.dateTime||b.start.date;
      return ta<tb?-1:ta>tb?1:0;
    });
  }catch(e){return[];}
}

  const msgs=await fetchGmailUnread();

  el.innerHTML=msgs.map(msg=>{
    const hdrs=msg.payload?.headers||[];
    const subject=hdrs.find(h=>h.name==='Subject')?.value||'(sin asunto)';
    const from=(hdrs.find(h=>h.name==='From')?.value||'').replace(/<[^>]+>/,'').trim();
    return `<div class="gmail-item">
      <div class="gmail-item-info">
        <div class="gmail-item-subject">${escapeHtml(subject)}</div>

    </div>`;

}
async function fetchGmailUnread(){
  if(!googleToken) return[];
  try{
    const lr=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?q=is:starred&maxResults=20',
      {headers:{Authorization:`Bearer ${googleToken}`}});
    if(lr.status===401){handleGoogleExpired();return[];}
    if(!lr.ok) return[];
    const ids=((await lr.json()).messages||[]).map(m=>m.id);
    if(!ids.length) return[];
    return await Promise.all(ids.map(id=>
      fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From`,
        {headers:{Authorization:`Bearer ${googleToken}`}}).then(r=>r.json())
    ));
  }catch(e){return[];}
}

function renameArea(idx, newVal){
  newVal = newVal.trim();
  const old = state.areas[idx];
  if(!newVal || newVal === old) return;
  if(state.areas.some((a,i)=>i!==idx && a===newVal)){ setStatus('Esa área ya existe.'); renderAreaManage(); return; }
  state.areas[idx] = newVal;
  state.tasks.filter(t=>(t.areas||[]).includes(old)).forEach(t=>{ t.areas=t.areas.map(a=>a===old?newVal:a); saveTaskRow(t); });
  state.projects.filter(p=>(p.areas||[]).includes(old)).forEach(p=>{ p.areas=p.areas.map(a=>a===old?newVal:a); saveProjectRow(p); });
  saveSettings(); setStatus('Área renombrada.');
}
function renameTipo(idx, newVal){
  newVal = newVal.trim();
  const old = state.tipos[idx];
  if(!newVal || newVal === old) return;
  if(state.tipos.some((t,i)=>i!==idx && t===newVal)){ setStatus('Ese tipo ya existe.'); renderAreaManage(); return; }
  state.tipos[idx] = newVal;
  state.tasks.filter(t=>t.tipo===old).forEach(t=>{ t.tipo=newVal; saveTaskRow(t); });
  saveSettings(); setStatus('Tipo renombrado.');
}

function taskCard(t, showTipo){
  const today=todayStr();
  const overdue=t.due && t.due<today && t.status!=='hecha';
  const areaBadges=(t.areas||[]).map(a=>`<span class="badge area">${escapeHtml(a)}</span>`).join('');
  const pn=projName(t.projectId);
  const outgoing=(t.linkedTaskIds||[]).filter(id=>state.tasks.find(x=>x.id===id));
  const incoming=state.tasks.filter(x=>x.id!==t.id&&(x.linkedTaskIds||[]).includes(t.id));
  const totalLinks=new Set([...outgoing,...incoming.map(x=>x.id)]).size;
  const linkBadge=totalLinks?`<span class="badge link" title="${[...outgoing.map(id=>{const x=state.tasks.find(t=>t.id===id);return x?x.title:''}),...incoming.map(x=>x.title)].filter(Boolean).join(', ')}">🔗 ${totalLinks} vinculada${totalLinks!==1?'s':''}</span>`:'';

  const expanded = expandedSubtasks.has(t.id);
  const sub = (t.subtasks&&t.subtasks.length) ? `
    <div class="subprogress" onclick="toggleSubtasksExpand('${t.id}',event)" style="cursor:pointer;">
      Subtareas: ${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length} ${expanded?'▾':'▸'}
    </div>
    ${expanded ? `<ul class="sub-list" style="margin-top:4px;">
      ${t.subtasks.map(s=>`
        <li onclick="event.stopPropagation();">
          <input type="checkbox" ${s.done?'checked':''} onchange="toggleSubtaskInline('${t.id}','${s.id}')">
          <span class="${s.done?'done':''}">${escapeHtml(s.text)}</span>
        </li>
        ${(s.children||[]).map(c=>`
        <li style="margin-left:20px;" onclick="event.stopPropagation();">
          <input type="checkbox" ${c.done?'checked':''} onchange="toggleChildSubtaskInline('${t.id}','${s.id}','${c.id}')">
          <span class="${c.done?'done':''}">${escapeHtml(c.text)}</span>
        </li>`).join('')}`).join('')}
    </ul>` : ''}` : '';
  return `
  <div class="task ${t.urgency} ${t.status==='hecha'?'done':''}" onclick="openTaskModal('${t.id}')">
    <p class="task-title ${t.status==='hecha'?'done':''}">${escapeHtml(t.title)}</p>
    <div class="badges-row">
      <span class="badge ${t.urgency}" onclick="cycleUrgency('${t.id}',event)" title="Clic para cambiar urgencia" style="cursor:pointer;">${t.urgency}</span>
      ${showTipo && t.tipo?`<span class="badge tipo">${t.tipo}</span>`:''}
      ${t.meetingId?`<span class="badge proj">📋 Ficha</span>`:''}
      ${t.callWith?`<span class="badge area">📞 ${escapeHtml(t.callWith)}</span>`:''}
      ${pn?`<span class="badge proj">${escapeHtml(pn)}</span>`:''}
      ${linkBadge}
      ${areaBadges}
    </div>
    ${sub}
    <div class="task-meta">${t.due?`<span class="${overdue?'overdue':''}">${overdue?'Vencida — ':'Vence '}${fmtDateShort(t.due)}</span>`:'Sin fecha'}</div>
    <div style="margin-top:7px; display:flex; gap:5px;">
      <button class="btn-ghost btn-small" onclick="toggleDone('${t.id}',event)">${t.status==='hecha'?'Reabrir':'Hecha'}</button>
      <button class="btn-ghost btn-small" onclick="deleteTask('${t.id}',event)">Eliminar</button>
    </div>
  </div>`;
}

function renderKanban(taskSet){
  const open=taskSet.filter(t=>t.status!=='hecha');
  const order={alta:0,media:1,baja:2};
  const sortFn=(a,b)=>order[a.urgency]-order[b.urgency]||(a.due||'9999').localeCompare(b.due||'9999');
  const cols=[
    {title:'Urgente', cls:'urgente', items:open.filter(t=>t.urgency==='alta').sort(sortFn), showTipo:true}
  ];
  state.tipos.forEach(tp=>{
    cols.push({title:tp, cls:'', items:open.filter(t=>t.tipo===tp&&t.urgency!=='alta').sort(sortFn), showTipo:false});
  });
  const sinTipo=open.filter(t=>(!t.tipo || !state.tipos.includes(t.tipo))&&t.urgency!=='alta').sort(sortFn);
  if(sinTipo.length) cols.push({title:'Sin tipo', cls:'', items:sinTipo, showTipo:false});
  return '<div class="kanban">'+cols.map(c=>`
    <div class="kcol ${c.cls}">
      <h3>${escapeHtml(c.title)} <span class="count">${c.items.length}</span></h3>
      ${c.items.length ? c.items.map(t=>taskCard(t,c.showTipo)).join('') : '<p class="empty">Nada aquí.</p>'}
    </div>`).join('')+'</div>';
}

  else if(currentUrgFilter!=='todas') list=list.filter(t=>t.urgency===currentUrgFilter&&t.status!=='hecha');

  if(currentTipoFilter==='sintipo') list=list.filter(t=>!t.tipo || !state.tipos.includes(t.tipo));
  else if(currentTipoFilter!=='todas') list=list.filter(t=>t.tipo===currentTipoFilter);
  list.sort((a,b)=>order[a.urgency]-order[b.urgency]||(a.due||'9999').localeCompare(b.due||'9999'));

  const urgOpts=[['todas','Todas'],['alta','Alta'],['media','Media'],['baja','Baja'],['hecha','Hechas']];

    ${list.length ? list.map(t=>taskCard(t,true)).join('') : '<p class="empty">Nada aquí con estos filtros.</p>'}`;
}

function renderProyectosList(filterArea){
  const scope = filterArea ? state.projects.filter(p=>(p.areas||[]).includes(filterArea)) : state.projects;
  const addBox=`<div class="proj-add"><input type="text" id="newProjInput" placeholder="${filterArea?'Nuevo desarrollo (p. ej. Dashboard de presupuesto)...':'Nuevo proyecto (p. ej. Licitación cocina La Tebaida)...'}" onkeydown="if(event.key==='Enter'){event.preventDefault();addProject(${filterArea?`'${escapeAttr(filterArea)}'`:''});}"><button class="btn-primary btn-small" onclick="addProject(${filterArea?`'${escapeAttr(filterArea)}'`:''})">${filterArea?'Crear desarrollo':'Crear proyecto'}</button></div>`;
  const archivedCount = scope.filter(p=>!p.active).length;
  const toggleBox = `<div class="filters"><button class="btn-small ${!showArchivedProjects?'active':''}" onclick="showArchivedProjects=false; render();">Activos</button><button class="btn-small ${showArchivedProjects?'active':''}" onclick="showArchivedProjects=true; render();">Archivados (${archivedCount})</button></div>`;
  const visible = scope.filter(p=>showArchivedProjects ? !p.active : p.active);
  if(scope.length===0) return addBox+`<p class="empty">${filterArea?'No hay desarrollos todavía.':'No hay proyectos. Crea uno y entra en él para gestionar su panel y su diario.'}</p>`;
  if(visible.length===0) return addBox+toggleBox+'<p class="empty">'+(showArchivedProjects?'No hay archivados.':'No hay activos.')+'</p>';
  return addBox + toggleBox + visible.map(p=>{
    const tasks=state.tasks.filter(t=>t.projectId===p.id);
    const open=tasks.filter(t=>t.status!=='hecha');
    const urgent=open.filter(t=>t.urgency==='alta').length;
    const areaBadges=p.areas.map(a=>`<span class="badge area">${escapeHtml(a)}</span>`).join(' ');
    const lastLog=p.log.length?('Último apunte: '+fmtDateShort(p.log[0].date)):'Sin apuntes en el diario';
    return `
    <div class="proj-list-card" onclick="openProject('${p.id}')">
      <h3>${escapeHtml(p.name)}
        <button class="btn-ghost btn-small" style="float:right;" onclick="toggleProjectActive('${p.id}',event)">${p.active?'Archivar':'Reactivar'}</button>
      </h3>
      <div class="badges-row" style="margin:4px 0 7px;">${areaBadges||'<span class="empty">Sin áreas asignadas</span>'}</div>
      <div class="proj-meta">${open.length} abiertas${urgent?' · <strong style="color:var(--alta);">'+urgent+' urgente'+(urgent>1?'s':'')+'</strong>':''} · ${tasks.length-open.length} hechas · ${lastLog}</div>
    </div>`;
  }).join('');
}

function renderProjectDetail(){
  const p=getProj(currentProjectId);
  if(!p) { currentProjectId=null; return renderProyectosList(); }
  const tasks=state.tasks.filter(t=>t.projectId===p.id);
  const areaChecks=state.areas.map(a=>`
    <label class="chk ${p.areas.includes(a)?'checked':''}" onclick="event.preventDefault(); toggleProjArea('${p.id}','${escapeAttr(a)}')">
      ${escapeHtml(a)}
    </label>`).join('');
  const logHtml = p.log.length ? p.log.map(e=>`
    <div class="log-entry">
      <div class="log-date">${fmtDate(e.date)} <button class="btn-ghost btn-small" onclick="deleteLogEntry('${p.id}','${e.id}')">×</button></div>
      <div class="log-text">${escapeHtml(e.text)}</div>
    </div>`).join('') : '<p class="empty">El diario está vacío. Los apuntes que hagas quedan aquí con fecha.</p>';

  return `
    <div class="proj-head">
      <h3>${escapeHtml(p.name)}
        <span style="display:flex; gap:6px;">
          <button class="btn-ghost btn-small" onclick="closeProject()">← Volver</button>
          <button class="btn-ghost btn-small" onclick="deleteProject('${p.id}',event)">Eliminar</button>
        </span>
      </h3>
      <div class="field" style="margin-bottom:0;">
        <label>Áreas del proyecto (clic para activar/desactivar)</label>
        <div class="checks">${areaChecks}</div>
      </div>
    </div>

    <p class="sect-h">Panel del proyecto</p>
    ${tasks.length ? renderKanban(tasks) : '<p class="empty">Sin tareas asignadas. Usa "+ Añadir tarea" (se asignará a este proyecto automáticamente).</p>'}

    <div class="panel-box" style="margin-top:16px;">
      <h2>Diario del proyecto</h2>
      <div class="row-flex">
        <textarea id="projLogInput" placeholder="Apunte de hoy sobre este proyecto..."></textarea>
      </div>
      <div style="margin-top:8px; display:flex; justify-content:flex-end;">
        <button class="btn-primary btn-small" onclick="addLogEntry('${p.id}')">Apuntar con fecha de hoy</button>
      </div>
      <div style="margin-top:12px;">${logHtml}</div>
    </div>`;
}

loadState();
</script>
</body>
</html>
