async function syncAgendaDirector(){
  if(!googleToken||!_agendaDirCal||!_reunionesCal) return;
  const missing=_reunionesEvents15.filter(ev=>_reunionesMissingIds.has(ev.id));
  if(!missing.length) return;
  const btn=document.querySelector('#agendaSyncBar button');
  if(btn){ btn.disabled=true; btn.textContent='Copiando...'; }
  let ok=0, fail=0;
  for(const ev of missing){
    const body={summary:ev.summary,description:ev.description,location:ev.location,start:ev.start,end:ev.end};
    if(ev.conferenceData) body.conferenceData=ev.conferenceData;
    try{
      const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(_agendaDirCal.id)}/events`,{
        method:'POST',headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
      r.ok?ok++:fail++;
    }catch(e){ fail++; }
  }
  alert(`✓ ${ok} evento${ok!==1?'s':''} copiado${ok!==1?'s':''} a Agenda Director${fail?` · ${fail} error${fail!==1?'es':''}`:''}.`);
  await checkAgendaDirectorSync();
}

function _buildSpanBars(items, weekDays){
  // items: [{start, end, color, label, onClick}]
  // Returns bars with col, span, lane assigned
  const weekStart=weekDays[0], weekEnd=weekDays[6];
  const raw=items.map(item=>{
    const effS=item.start<weekStart?weekStart:item.start;
    const effE=item.end>weekEnd?weekEnd:item.end;
    const col=weekDays.indexOf(effS)+1;
    const col2=weekDays.indexOf(effE)+1;
    if(col<1||col2<col) return null;
    return{...item,col,span:col2-col+1,cBefore:item.start<weekStart,cAfter:item.end>weekEnd};
  }).filter(Boolean);
  const lanes=[];
  return raw.map(b=>{
    const effEnd=weekDays[b.col+b.span-2];
    const effStart=weekDays[b.col-1];
    let li=lanes.findIndex(e=>!e||e<effStart);
    if(li===-1){lanes.push(effEnd);li=lanes.length-1;} else lanes[li]=effEnd;
    const cls=b.cBefore&&b.cAfter?'cont-both':b.cBefore?'cont-before':b.cAfter?'cont-after':'';
    return{...b,lane:li+1,cls};
  });
}
function _gcalAllDaySpans(events){
  return events.filter(ev=>{
    if(!ev.start.date||!ev.end?.date) return false;
    const endExcl=new Date(new Date(ev.end.date+'T12:00:00').getTime()-86400000).toISOString().slice(0,10);
    return endExcl>ev.start.date;
  }).map(ev=>({
    start:ev.start.date,
    end:new Date(new Date(ev.end.date+'T12:00:00').getTime()-86400000).toISOString().slice(0,10),
    color:ev._calColor||'#4285F4',label:ev.summary||'',onClick:`openCalEventModal('${escapeAttr(ev.id)}')`
  }));
}
function _ltaskSpans(){
  return showCalLocalTasks ? state.tasks.filter(t=>t.start&&t.due&&t.start<t.due&&t.status!=='hecha').map(t=>({
    start:t.start,end:t.due,
    color:{alta:'#ef4444',media:'#f59e0b',baja:'#22c55e','':'#7c3aed'}[t.urgency||''],
    label:t.title,onClick:`openTaskModal('${escapeAttr(t.id)}')`
  })) : [];
}
function _renderSpanBars(bars){
  if(!bars.length) return '';
  const maxLane=Math.max(...bars.map(b=>b.lane));
  return `<div class="cal-spans-container"><div class="cal-spans-inner" style="grid-auto-rows:22px;min-height:${maxLane*23}px;">
    ${bars.map(b=>`<div class="cal-span-bar ${b.cls}" style="grid-column:${b.col}/span ${b.span};grid-row:${b.lane};background:${b.color};" onclick="${b.onClick}" title="${escapeHtml(b.label)}">${b.cBefore?'◀ ':''}${escapeHtml(b.label)}${b.cAfter?' ▶':''}</div>`).join('')}
  </div></div>`;
}

function renderCalMonthGrid(){
  const grid=document.getElementById('calMonthGrid'); if(!grid) return;
  const yr=calViewMonth.getFullYear(), mo=calViewMonth.getMonth();
  const today=todayStr();
  const firstDay=new Date(yr,mo,1);
  const lastDay=new Date(yr,mo+1,0);
  let startDow=firstDay.getDay(); if(startDow===0) startDow=7; startDow--;

  const byDay={};
  calMonthEvents.forEach(ev=>{
    const d=ev.start.dateTime?ev.start.dateTime.slice(0,10):ev.start.date;
    if(!byDay[d])byDay[d]=[]; byDay[d].push(ev);
  });

  // Single-day tasks (no start range) for pills inside day cells
  const singleByDay={};
  if(showCalGTasks) googleTasks.filter(t=>t.due).forEach(t=>{
    const d=t.due.slice(0,10);
    if(!singleByDay[d])singleByDay[d]=[];
    singleByDay[d].push({_type:'gtask',...t});
    if(d<today&&d!==today){if(!singleByDay[today])singleByDay[today]=[]; singleByDay[today].push({_type:'gtask',_overdue:true,...t});}
  });
  if(showCalLocalTasks) state.tasks.filter(t=>t.due&&t.status!=='hecha'&&(!t.start||t.start===t.due)).forEach(t=>{
    if(!singleByDay[t.due])singleByDay[t.due]=[];
    singleByDay[t.due].push({_type:'ltask',...t});
    if(t.due<today&&t.due!==today){if(!singleByDay[today])singleByDay[today]=[]; singleByDay[today].push({_type:'ltask',_overdue:true,...t});}
  });

  // Build spanning bar sources
  const gcalSpans=_gcalAllDaySpans(calMonthEvents);
  const ltSpans=_ltaskSpans();
  const allSpanItems=[...gcalSpans,...ltSpans];

  // Build weeks
  const weeks=[];
  let wk=[];
  for(let i=0;i<startDow;i++) wk.push(null);
  for(let d=1;d<=lastDay.getDate();d++){
    wk.push(`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    if(wk.length===7){weeks.push(wk);wk=[];}
  }
  while(wk.length>0&&wk.length<7) wk.push(null);
  if(wk.length) weeks.push(wk);

  const dowLabels=['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
  let html='<div class="cal-dow-row">'+dowLabels.map(d=>`<div class="cal-dow">${d}</div>`).join('')+'</div>';

  weeks.forEach(weekDays=>{
    const valid=weekDays.filter(Boolean);
    if(!valid.length) return;
    const weekStart=valid[0], weekEnd=valid[valid.length-1];
    const weekItems=allSpanItems.filter(it=>it.end>=weekStart&&it.start<=weekEnd);
    const bars=_buildSpanBars(weekItems,weekDays);
    const spansHtml=_renderSpanBars(bars);

    const daysHtml=weekDays.map(ds=>{
      if(!ds) return '<div class="cal-day other-month" style="grid-row:2;"></div>';
      const isToday=ds===today, isSel=ds===calSelectedDay;
      const evs=(byDay[ds]||[]).filter(ev=>ev.start.dateTime);
      const tasks=singleByDay[ds]||[];
      const MAX=4;
      const evRows=evs.slice(0,MAX).map(ev=>{
        const isMissing=_reunionesCal&&ev._calId===_reunionesCal.id&&_reunionesMissingIds.has(ev.id);
        const t=new Date(ev.start.dateTime).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
        return `<div class="cal-ev-row${isMissing?' missing-agenda':''}" onclick="event.stopPropagation();openCalEventModal('${escapeAttr(ev.id)}')" title="${isMissing?'⚠ Falta en Agenda Director — ':''}${escapeAttr(ev.summary||'')}">
          <span class="cal-ev-dot" style="background:${ev._calColor||'var(--accent)'};"></span>
          <span class="cal-ev-time">${t}</span>
          <span class="cal-ev-title">${isMissing?'⚠ ':''}${escapeHtml(ev.summary||'')}</span>
        </div>`;
      }).join('');
      const taskRows=tasks.slice(0,Math.max(0,MAX-evs.length)).map(t=>
        t._type==='gtask'
          ?`<div class="cal-ev-row${t._overdue?' overdue':''}" onclick="event.stopPropagation();openGTaskModal('${escapeAttr(t._listId)}','${escapeAttr(t.id)}')">
              <span class="cal-ev-dot" style="background:#1a73e8;"></span>
              <span class="cal-ev-title">${t._overdue?'⚠ ':'✓ '}${escapeHtml(t.title||'')}</span>
            </div>`
          :`<div class="cal-ev-row ${t.urgency||''}${t._overdue?' overdue':''}" onclick="event.stopPropagation();openTaskModal('${escapeAttr(t.id)}')">
              <span class="cal-ev-dot" style="background:#7c3aed;"></span>
              <span class="cal-ev-title">${t._overdue?'⚠ ':''}${escapeHtml(t.title||'')}</span>
            </div>`
      ).join('');
      const totalExtra=(evs.length-MAX)+(tasks.length-Math.max(0,MAX-evs.length));
      const more=totalExtra>0?`<div class="cal-event-more" onclick="event.stopPropagation();selectCalDay('${ds}')">+${totalExtra} más</div>`:'';
      return `<div class="cal-day ${isToday?'today':''} ${isSel?'selected':''}" style="grid-row:2;" data-date="${ds}" onclick="selectCalDay('${ds}')">
        <div class="cal-day-num"><span>${parseInt(ds.slice(8))}</span></div>${evRows}${taskRows}${more}
      </div>`;
    }).join('');

    html+=`<div class="cal-month-week">${spansHtml}${daysHtml}</div>`;
  });

  grid.innerHTML=html;
}
async function refreshHeaderEvents(){
  if(!googleToken) return;
  const cfg=state.calendarConfig||{};
  const cfgIds=[cfg.primary,cfg.secondary].filter(Boolean);
  if(!cfgIds.length){ calHeaderEvents=[]; updateHeaderEvents(); return; }
  if(!googleCalendars.length) await fetchCalendarList();
  const activeCals=googleCalendars.filter(c=>cfgIds.includes(c.id));
  if(!activeCals.length){ calHeaderEvents=[]; updateHeaderEvents(); return; }
  const now=new Date();
  const end=new Date(now.getTime()+7*24*60*60*1000);
  try{
    const results=await Promise.all(activeCals.map(cal=>
      fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${encodeURIComponent(now.toISOString())}&timeMax=${encodeURIComponent(end.toISOString())}&singleEvents=true&orderBy=startTime&maxResults=20`,
        {headers:{Authorization:`Bearer ${googleToken}`}})
      .then(r=>r.ok?r.json():{items:[]})
      .then(d=>(d.items||[]).map(ev=>({...ev,_calName:cal.summary,_calColor:cal.backgroundColor,_calId:cal.id})))
      .catch(()=>[])
    ));
    calHeaderEvents=results.flat().sort((a,b)=>(a.start.dateTime||a.start.date)<(b.start.dateTime||b.start.date)?-1:1);
  }catch(e){ calHeaderEvents=[]; }
  updateHeaderEvents();
}
function updateHeaderEvents(){
  const el=document.getElementById('headerEvents'); if(!el) return;
  if(!googleToken || !calHeaderEvents.length){ el.innerHTML=''; return; }
  const now=new Date();
  const today=todayStr();
  const tmrw=new Date(now); tmrw.setDate(now.getDate()+1);
  const tmrwStr=`${tmrw.getFullYear()}-${String(tmrw.getMonth()+1).padStart(2,'0')}-${String(tmrw.getDate()).padStart(2,'0')}`;

  const upcoming=calHeaderEvents.filter(ev=>{
    const t=ev.start.dateTime?new Date(ev.start.dateTime):new Date(ev.start.date+'T00:00:00');
    return t>=now;
  }).slice(0,14);
  if(!upcoming.length){ el.innerHTML=''; return; }

  // Group by day
  const byDay=new Map();
  upcoming.forEach(ev=>{
    const ds=(ev.start.dateTime||ev.start.date).slice(0,10);
    if(!byDay.has(ds)) byDay.set(ds,[]);
    byDay.get(ds).push(ev);
  });

  let html='';
  byDay.forEach((evs,ds)=>{
    let lbl;
    if(ds===today) lbl='Hoy';
    else if(ds===tmrwStr) lbl='Mañana';
    else{ const d=new Date(ds+'T12:00:00'); lbl=d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'}); }
    html+=`<span class="ep-day-sep">${lbl}</span>`;
    evs.forEach(ev=>{
      const t=ev.start.dateTime?new Date(ev.start.dateTime).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):'Todo el día';
      const dot=ev._calColor?`<span class="ep-dot" style="background:${ev._calColor};"></span>`:'';
      const meetLink=ev.hangoutLink||_extractMeetLink(ev);
      const meetBtn=meetLink?`<a href="${escapeAttr(meetLink)}" target="_blank" class="ep-meet-btn" onclick="event.stopPropagation();" title="Unirse"><i class="ti ti-video"></i></a>`:'';
      html+=`<span class="header-event-pill" onclick="openCalEventModal('${escapeAttr(ev.id)}')" style="cursor:pointer;">${dot}<span class="ep-time">${t}</span><span class="ep-title">${escapeHtml(ev.summary||'(sin título)')}</span>${meetBtn}</span>`;
    });
  });

  el.innerHTML=html;
  upcoming.forEach(ev=>scheduleMeetingNotification(ev));
  scheduleMeetingAlerts();
}
function _extractMeetLink(ev){
  const entries=ev.conferenceData?.entryPoints||[];
  const video=entries.find(e=>e.entryPointType==='video');
  if(video) return video.uri;
  const loc=ev.location||'';
  const desc=ev.description||'';
  const meetRe=/https:\/\/meet\.google\.com\/[a-z0-9-]+/i;
  return (loc.match(meetRe)||desc.match(meetRe)||[null])[0];
}
function scheduleMeetingAlerts(){
  if(_meetAlertTimer) return;
  if(Notification.permission==='default') Notification.requestPermission();
  _meetAlertTimer=setInterval(checkMeetingAlerts, 60000);
  checkMeetingAlerts();
}
function checkMeetingAlerts(){
  if(!calHeaderEvents.length) return;
  const now=Date.now();
  calHeaderEvents.forEach(ev=>{
    if(!ev.start?.dateTime) return;
    const start=new Date(ev.start.dateTime).getTime();
    const diff=start-now;
    if(diff>0 && diff<=5*60*1000){
      if(_alertedEvents.has(ev.id)) return;
      _alertedEvents.add(ev.id);
      const title=ev.summary||'Reunión';
      const hh=new Date(ev.start.dateTime).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      const meetLink=ev.hangoutLink||_extractMeetLink(ev);
      if(Notification.permission==='granted'){
        const n=new Notification('📅 '+title,{body:'Comienza a las '+hh+(meetLink?' · Reunión online':''),icon:''});
        if(meetLink) n.onclick=()=>{window.open(meetLink,'_blank');n.close();};
        setTimeout(()=>n.close(),15000);
      }
    }
  });
}

function _findCalEvent(id){ return calMonthEvents.find(x=>x.id===id)||calHeaderEvents.find(x=>x.id===id)||null; }

function openCalEventModal(eventId, defaultDate){
  const ev = eventId ? _findCalEvent(eventId) : null;
  const isAllDay = ev ? !!ev.start?.date : false;
  const startDt = ev?.start?.dateTime ? new Date(ev.start.dateTime) : null;
  const endDt   = ev?.end?.dateTime   ? new Date(ev.end.dateTime)   : null;
  const startDate = ev ? (ev.start.date || ev.start.dateTime?.slice(0,10)) : (defaultDate || todayStr());

async function saveCalEvent(eventId, originalCalId){
  const title = document.getElementById('cevTitle')?.value.trim();
  if(!title){ setStatus('El título no puede estar vacío.'); return; }
  const newCalId   = document.getElementById('cevCalId')?.value || originalCalId || 'primary';
  const allDay     = document.getElementById('cevAllDay')?.checked;
  const startDate  = document.getElementById('cevStartDate')?.value;
  const startTime  = document.getElementById('cevStartTime')?.value || '00:00';
  const endDate    = document.getElementById('cevEndDate')?.value || startDate;
  const endTime    = document.getElementById('cevEndTime')?.value || '01:00';
  const desc       = document.getElementById('cevDesc')?.value.trim() || '';
  const location   = document.getElementById('cevLocation')?.value.trim() || '';
  if(!startDate || !googleToken) return;
  const body = { summary: title };
  if(desc)     body.description = desc;
  if(location) body.location    = location;
  if(allDay){
    body.start = { date: startDate };
    const endExcl = new Date(endDate+'T12:00:00'); endExcl.setDate(endExcl.getDate()+1);
    body.end = { date: endExcl.toISOString().slice(0,10) };
  } else {
    body.start = { dateTime: `${startDate}T${startTime}:00`, timeZone: 'Europe/Madrid' };
    body.end   = { dateTime: `${endDate}T${endTime}:00`,     timeZone: 'Europe/Madrid' };
  }
  try{
    let r;
    if(eventId && originalCalId && newCalId !== originalCalId){
      // Move to different calendar: delete + create
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(originalCalId)}/events/${encodeURIComponent(eventId)}`,
        { method:'DELETE', headers:{Authorization:`Bearer ${googleToken}`} });
      r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(newCalId)}/events`,
        { method:'POST', headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'}, body:JSON.stringify(body) });
    } else if(eventId){
      r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(originalCalId||newCalId)}/events/${encodeURIComponent(eventId)}`,
        { method:'PUT', headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'}, body:JSON.stringify(body) });
    } else {
      r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(newCalId)}/events`,
        { method:'POST', headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'}, body:JSON.stringify(body) });
    }
    if(r.status===401){ handleGoogleExpired(); return; }
    if(!r.ok){ setStatus('Error al guardar el evento.'); return; }
    setStatus(eventId ? 'Evento actualizado.' : 'Evento creado.');
    closeModal();
    loadCalendarData(); refreshHeaderEvents();
  }catch(e){ setStatus('Error al guardar el evento.'); }
}

async function deleteCalEvent(eventId, calId){
  if(!googleToken || !eventId || !calId) return;
  if(!confirm('¿Eliminar este evento de Google Calendar?')) return;
  try{
    const r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${encodeURIComponent(eventId)}`,
      { method:'DELETE', headers:{Authorization:`Bearer ${googleToken}`} });
    if(r.status===401){ handleGoogleExpired(); return; }
    if(r.ok || r.status===204){
      calMonthEvents  = calMonthEvents.filter(x=>x.id!==eventId);
      calHeaderEvents = calHeaderEvents.filter(x=>x.id!==eventId);
      setStatus('Evento eliminado.');
      closeModal();
      if(currentView==='calendario') render();
      refreshHeaderEvents();
    } else { setStatus('Error al eliminar el evento.'); }
  }catch(e){ setStatus('Error al eliminar el evento.'); }
}

async function rsvpEvent(eventId, calId, response){
  if(!googleToken || !eventId || !calId) return;
  const ev = _findCalEvent(eventId);
  if(!ev) return;
  const attendees = (ev.attendees||[]).map(a=>
    a.self ? {...a, responseStatus: response} : a
  );
  try{
    const r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${encodeURIComponent(eventId)}`,
      { method:'PATCH', headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'},
        body: JSON.stringify({attendees}) });
    if(r.status===401){ handleGoogleExpired(); return; }
    if(r.ok){
      const updated = await r.json();
      // update local cache
      const idx = calMonthEvents.findIndex(x=>x.id===eventId);
      if(idx>=0) calMonthEvents[idx]={...calMonthEvents[idx],...updated};
      const idx2 = calHeaderEvents.findIndex(x=>x.id===eventId);
      if(idx2>=0) calHeaderEvents[idx2]={...calHeaderEvents[idx2],...updated};
      const labels={accepted:'Aceptado',declined:'Rechazado',tentative:'Tal vez'};
      setStatus(labels[response]||'Respuesta enviada.');
      openCalEventModal(eventId);
    } else { setStatus('Error al enviar respuesta.'); }
  }catch(e){ setStatus('Error al enviar respuesta.'); }
}

async function fetchCalendarEvents(timeMin, timeMax){
  if(!googleToken) return [];
  if(!googleCalendars.length) await fetchCalendarList();
  const activeCals = googleCalendars.filter(c=>isCalEnabled(c.id));
  if(!activeCals.length) return [];
  const now=timeMin||new Date().toISOString();
  const end=timeMax||new Date(Date.now()+7*24*60*60*1000).toISOString();
  try{
    const results=await Promise.all(activeCals.map(cal=>
      fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${encodeURIComponent(now)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime&maxResults=50`,
        {headers:{Authorization:`Bearer ${googleToken}`}})
      .then(r=>{ if(r.status===401){handleGoogleExpired();} return r.ok?r.json():{items:[]}; })
      .then(d=>(d.items||[]).map(ev=>({...ev,_calName:cal.summary,_calColor:cal.backgroundColor,_calId:cal.id})))
      .catch(()=>[])
    ));
    return results.flat().sort((a,b)=>{
      const ta=a.start.dateTime||a.start.date;
      const tb=b.start.dateTime||b.start.date;
      return ta<tb?-1:ta>tb?1:0;
    });
  }catch(e){return[];}
}

function formatEmailDate(dateStr){
  try{
    const d=new Date(dateStr), now=new Date();
    if(d.toDateString()===now.toDateString()) return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    if(now-d < 7*86400000) return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric'});
    return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  }catch(e){return'';}
}

    iframe.srcdoc=`<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:system-ui,sans-serif;font-size:13px;line-height:1.6;margin:0;padding:8px;color:#1A1A18;word-break:break-word;}a{color:#2563EB;}img{max-width:100%;}</style></head><body>${body.html}</body></html>`;

function extractEmailBody(payload){
  if(!payload) return{text:'',html:''};
  let text='',html='';
  function decode(data){ try{ return decodeURIComponent(escape(atob(data.replace(/-/g,'+').replace(/_/g,'/')||''))); }catch(e){ return atob((data||'').replace(/-/g,'+').replace(/_/g,'/')); } }
  function walk(p){
    if(!p) return;
    if(p.mimeType==='text/html' && p.body?.data && !html) html=decode(p.body.data);
    else if(p.mimeType==='text/plain' && p.body?.data && !text) text=decode(p.body.data);
    if(p.parts) p.parts.forEach(walk);
  }
  if(payload.body?.data){ return payload.mimeType==='text/html'?{html:decode(payload.body.data),text:''}:{text:decode(payload.body.data),html:''}; }
  walk(payload);
  return{text,html};
}

async function completeGoogleTask(listId,taskId){

      method:'PATCH',
      headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'},

      <div class="gtl-card-footer">

  const activeTitle = lists.find(l=>l.id===activeList)?.title || 'Tareas';

  return `<div class="gtasks-layout">
    <div class="gtl-sidebar">
      <div class="gtl-sidebar-head">Listas</div>
      ${sidebarItems}
      ${!lists.length?`<div style="padding:12px 10px;font-size:12px;color:var(--text-soft);">Cargando…</div>`:''}
    </div>
    <div class="gtl-main">

        <button class="btn-ghost btn-small" onclick="fetchGoogleTasks()" title="Actualizar"><i class="ti ti-refresh" style="font-size:12px;"></i> Actualizar</button>

        <button class="btn-primary btn-small" onclick="addGTaskQuick('${escapeAttr(activeList||'')}')">Añadir</button>
      </div>
      <div class="gtl-task-list">

      method:'POST',
      headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'},
      body: JSON.stringify({title})
    });

async function saveGTaskModal(listId, taskId){
  const title = document.getElementById('gtmTitle')?.value.trim();
  if(!title){ setStatus('El título no puede estar vacío.'); return; }
  const notes = document.getElementById('gtmNotes')?.value.trim() || '';
  const due   = document.getElementById('gtmDue')?.value || '';
  const linkLocalId = document.getElementById('gtmLinkLocal')?.value || '';
  if(!googleToken) return;
  try{
    const body = {title, notes};
    if(due) body.due = due+'T00:00:00.000Z'; else body.due = null;
    const r = await fetch(`https://tasks.googleapis.com/tasks/v1/lists/${encodeURIComponent(listId)}/tasks/${encodeURIComponent(taskId)}`,{
      method:'PATCH',
      headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(r.status===401){ handleGoogleExpired(); return; }
    if(!r.ok){ setStatus('Error al guardar Google Task.'); return; }

    // Update local cache
    const idx = googleTasks.findIndex(x=>x._listId===listId&&x.id===taskId);
    if(idx>=0) Object.assign(googleTasks[idx], {title, notes, due: due?due+'T00:00:00.000Z':''});

    // Create calendar event if checked
    const syncCal = document.getElementById('gtmSyncCal');
    if(syncCal?.checked && due){
      const calId    = document.getElementById('gtmCalId')?.value;
      const calStart = document.getElementById('gtmCalStart')?.value || '09:00';
      const calEnd   = document.getElementById('gtmCalEnd')?.value   || '10:00';
      if(calId){
        const ev = {summary:title, description:notes,
          start:{dateTime:`${due}T${calStart}:00`,timeZone:'Europe/Madrid'},
          end:  {dateTime:`${due}T${calEnd}:00`,  timeZone:'Europe/Madrid'}};
        await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events`,{
          method:'POST', headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'}, body:JSON.stringify(ev)
        });
        if(calView==='month') renderCalMonthGrid(); else if(currentView==='calendario') loadCalendarData();
      }
    }

    // Link to local task (new link selected)
    if(linkLocalId){
      const local = state.tasks.find(x=>x.id===linkLocalId);
      if(local){ local.gTaskId=taskId; local.gTaskListId=listId; saveTaskRow(local); }
    }

    // Sync changes to already-linked local task
    const linked = state.tasks.find(x=>x.gTaskId===taskId);
    if(linked){
      linked.title = title;
      if(notes) linked.context = notes;
      if(due)   linked.due = due;
      saveTaskRow(linked);
    }

    setStatus('Google Task guardada.');
    closeModal();
    if(currentView==='gtasks'||currentView==='lista'||currentView==='panel') render();
  }catch(e){ setStatus('Error al guardar Google Task.'); }
}

function unlinkGTask(taskId){
  const linked = state.tasks.find(x=>x.gTaskId===taskId);
  if(linked){ delete linked.gTaskId; delete linked.gTaskListId; saveTaskRow(linked); }
  setStatus('Vínculo eliminado.');
  closeModal();
  if(currentView==='gtasks'||currentView==='lista'||currentView==='panel') render();
}

function renameArea(idx, newVal){
  newVal = newVal.trim();
  const old = state.areas[idx];
  if(!newVal || newVal === old) return;
  if(state.areas.some((a,i)=>i!==idx && a===newVal)){ setStatus('Esa área ya existe.'); renderAreaManage(); return; }
  state.areas[idx] = newVal;
  state.tasks.filter(t=>(t.areas||[]).includes(old)).forEach(t=>{ t.areas=t.areas.map(a=>a===old?newVal:a); saveTaskRow(t); });
  state.projects.filter(p=>(p.areas||[]).includes(old)).forEach(p=>{ p.areas=p.areas.map(a=>a===old?newVal:a); saveProjectRow(p); });
  saveSettings(); setStatus('Área renombrada.');
}
function renameTipo(idx, newVal){
  newVal = newVal.trim();
  const old = state.tipos[idx];
  if(!newVal || newVal === old) return;
  if(state.tipos.some((t,i)=>i!==idx && t===newVal)){ setStatus('Ese tipo ya existe.'); renderAreaManage(); return; }
  state.tipos[idx] = newVal;
  state.tasks.filter(t=>t.tipo===old).forEach(t=>{ t.tipo=newVal; saveTaskRow(t); });
  saveSettings(); setStatus('Tipo renombrado.');
}

// ── Kanban drag & drop (cards) ───────────────────────────────────────────────
let _kDragId=null;
function _kDragStart(e,id){
  _kDragId=id; _colDragTipo=null;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  setTimeout(()=>{ const el=document.querySelector(`.task[data-task-id="${id}"]`); if(el) el.classList.add('k-dragging'); },0);
}
function _kDragEnd(e){
  document.querySelectorAll('.task.k-dragging').forEach(el=>el.classList.remove('k-dragging'));
  document.querySelectorAll('.kcol.k-drag-over').forEach(el=>el.classList.remove('k-drag-over'));
  document.querySelectorAll('.task.k-drop-above,.task.k-drop-below').forEach(el=>el.classList.remove('k-drop-above','k-drop-below'));
  _kDragId=null;
}
function _kColDragOver(e,colEl){
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  if(_colDragTipo!==null){
    document.querySelectorAll('.kcol.col-drop-left,.kcol.col-drop-right').forEach(el=>el.classList.remove('col-drop-left','col-drop-right'));
    if(_colDragTipo!==colEl.dataset.tipo){
      const r=colEl.getBoundingClientRect();
      colEl.classList.add(e.clientX<r.left+r.width/2?'col-drop-left':'col-drop-right');
    }
    return;
  }
  colEl.classList.add('k-drag-over');
  document.querySelectorAll('.task.k-drop-above,.task.k-drop-below').forEach(el=>el.classList.remove('k-drop-above','k-drop-below'));
  const card=e.target.closest('[data-task-id]');
  if(card&&card.dataset.taskId!==_kDragId){
    const r=card.getBoundingClientRect();
    card.classList.add(e.clientY<r.top+r.height/2?'k-drop-above':'k-drop-below');
  }
}
function _kColDragLeave(e,colEl){
  if(!colEl.contains(e.relatedTarget)){
    colEl.classList.remove('k-drag-over','col-drop-left','col-drop-right');
  }
}
function _kDrop(e,tipo){
  e.preventDefault();
  if(_colDragTipo!==null){ _doColDrop(e,tipo); return; }
  if(!_kDragId) return;
  const task=state.tasks.find(t=>t.id===_kDragId); if(!task) return;
  const srcTipo=task.tipo;
  if(!state.kanbanOrder) state.kanbanOrder={};
  if(srcTipo!==tipo && state.kanbanOrder[srcTipo])
    state.kanbanOrder[srcTipo]=state.kanbanOrder[srcTipo].filter(id=>id!==_kDragId);
  task.tipo=tipo;
  const tipoIds=state.tasks.filter(t=>t.status!=='hecha'&&t.tipo===tipo).map(t=>t.id);
  let ord=[...(state.kanbanOrder[tipo]||[])].filter(id=>tipoIds.includes(id));
  tipoIds.forEach(id=>{ if(!ord.includes(id)) ord.push(id); });
  ord=ord.filter(id=>id!==_kDragId);
  const card=e.target.closest('[data-task-id]');
  const tid=card?.dataset.taskId;
  if(tid&&tid!==_kDragId){
    const r=card.getBoundingClientRect();
    const before=e.clientY<r.top+r.height/2;
    const idx=ord.indexOf(tid);
    idx!==-1?ord.splice(before?idx:idx+1,0,_kDragId):ord.push(_kDragId);
  } else { ord.push(_kDragId); }
  state.kanbanOrder[tipo]=ord;
  _kDragId=null;
  if(task.tipo!==srcTipo) saveTaskRow(task);
  saveSettings(); render();
}

// ── Kanban drag & drop (columns) ─────────────────────────────────────────────
let _colDragTipo=null;
function _colDragStart(e,tipo){
  e.stopPropagation();
  _colDragTipo=tipo; _kDragId=null;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','col:'+tipo);
  setTimeout(()=>{
    document.querySelectorAll('.kcol').forEach(el=>{ if(el.dataset.tipo===tipo) el.classList.add('col-dragging'); });
  },0);
}
function _colDragEnd(e){
  document.querySelectorAll('.kcol.col-dragging,.kcol.col-drop-left,.kcol.col-drop-right').forEach(el=>el.classList.remove('col-dragging','col-drop-left','col-drop-right'));
  _colDragTipo=null;
}
function _doColDrop(e,targetTipo){
  if(!_colDragTipo||_colDragTipo===targetTipo){ _colDragTipo=null; return; }
  const tipos=[...state.tipos];
  const srcIdx=tipos.indexOf(_colDragTipo);
  const tgtIdx=tipos.indexOf(targetTipo);
  if(srcIdx===-1||tgtIdx===-1){ _colDragTipo=null; return; }
  tipos.splice(srcIdx,1);
  const newTgt=tipos.indexOf(targetTipo);
  const colEl=e.currentTarget||e.target.closest('.kcol');
  const before=colEl ? e.clientX<colEl.getBoundingClientRect().left+colEl.getBoundingClientRect().width/2 : true;
  tipos.splice(before?newTgt:newTgt+1,0,_colDragTipo);
  state.tipos=tipos;
  _colDragTipo=null;
  saveSettings(); render();
}

// ── Subtask drag & drop ──────────────────────────────────────────────────────
let _sDragIdx=null;
function _sDragStart(e,i){
  _sDragIdx=i;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>e.currentTarget.classList.add('s-dragging'),0);
}
function _sDragEnd(e){ e.currentTarget.classList.remove('s-dragging'); _sDragIdx=null; }
function _sDragOver(e,i){
  if(_sDragIdx===null) return;
  e.preventDefault();
  document.querySelectorAll('li.s-drop-above,li.s-drop-below').forEach(el=>el.classList.remove('s-drop-above','s-drop-below'));
  const r=e.currentTarget.getBoundingClientRect();
  e.currentTarget.classList.add(e.clientY<r.top+r.height/2?'s-drop-above':'s-drop-below');
}
function _sDrop(e,targetIdx){
  e.preventDefault();
  if(_sDragIdx===null||_sDragIdx===targetIdx){ _sDragIdx=null; return; }
  const r=e.currentTarget.getBoundingClientRect();
  const before=e.clientY<r.top+r.height/2;
  const moved=tempSubtasks.splice(_sDragIdx,1)[0];
  const dest=_sDragIdx<targetIdx?(before?targetIdx-1:targetIdx):(before?targetIdx:targetIdx+1);
  tempSubtasks.splice(dest,0,moved);
  _sDragIdx=null;
  renderSubList();
}

function taskCard(t, showTipo){
  const today=todayStr();
  const overdue=t.due && t.due<today && t.status!=='hecha';
  const areaBadges=(t.areas||[]).map(a=>`<span class="badge area">${escapeHtml(a)}</span>`).join('');
  const pn=projName(t.projectId);
  const outgoing=(t.linkedTaskIds||[]).filter(id=>state.tasks.find(x=>x.id===id));
  const incoming=state.tasks.filter(x=>x.id!==t.id&&(x.linkedTaskIds||[]).includes(t.id));
  const totalLinks=new Set([...outgoing,...incoming.map(x=>x.id)]).size;
  const linkBadge=totalLinks?`<span class="badge link" title="${[...outgoing.map(id=>{const x=state.tasks.find(t=>t.id===id);return x?x.title:''}),...incoming.map(x=>x.title)].filter(Boolean).join(', ')}">🔗 ${totalLinks} vinculada${totalLinks!==1?'s':''}</span>`:'';

  const expanded = expandedSubtasks.has(t.id);
  const sub = (t.subtasks&&t.subtasks.length) ? `
    <div class="subprogress" onclick="toggleSubtasksExpand('${t.id}',event)" style="cursor:pointer;">
      Subtareas: ${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length} ${expanded?'▾':'▸'}
    </div>
    ${expanded ? `<ul class="sub-list" style="margin-top:4px;">
      ${t.subtasks.map(s=>`
        <li onclick="event.stopPropagation();">
          <input type="checkbox" ${s.done?'checked':''} onchange="toggleSubtaskInline('${t.id}','${s.id}')">
          <span class="${s.done?'done':''}">${escapeHtml(s.text)}</span>
        </li>
        ${(s.children||[]).map(c=>`
        <li style="margin-left:20px;" onclick="event.stopPropagation();">
          <input type="checkbox" ${c.done?'checked':''} onchange="toggleChildSubtaskInline('${t.id}','${s.id}','${c.id}')">
          <span class="${c.done?'done':''}">${escapeHtml(c.text)}</span>
        </li>`).join('')}`).join('')}
    </ul>` : ''}` : '';
  const urgLabel={alta:'🔴 Alta',media:'🟡 Media',baja:'🟢 Baja'}[t.urgency]||t.urgency;
  return `
  <div class="task ${t.urgency} ${t.status==='hecha'?'done':''}" data-task-id="${t.id}"
    draggable="true" ondragstart="_kDragStart(event,'${t.id}')" ondragend="_kDragEnd(event)"
    onclick="openTaskModal('${t.id}')">
    <p class="task-title ${t.status==='hecha'?'done':''}"><span class="task-drag-handle"><i class="ti ti-grip-vertical"></i></span>${escapeHtml(t.title)}</p>
    <div class="badges-row">
      <span class="badge ${t.urgency}" onclick="cycleUrgency('${t.id}',event)" title="Clic para cambiar urgencia" style="cursor:pointer;">${urgLabel}</span>
      ${showTipo && t.tipo?`<span class="badge tipo">${escapeHtml(t.tipo)}</span>`:''}
      ${t.meetingId?`<span class="badge proj">📋 Ficha</span>`:''}
      ${t.callWith?`<span class="badge area">📞 ${escapeHtml(t.callWith)}</span>`:''}
      ${pn?`<span class="badge proj">${escapeHtml(pn)}</span>`:''}
      ${linkBadge}
      ${areaBadges}
      ${t.sourceEmailId?`<span class="badge" style="background:#e8f0fe;color:#1a73e8;border:1px solid #c5d8fd;cursor:pointer;" onclick="event.stopPropagation();openEmailFromTask('${escapeAttr(t.sourceEmailId)}')">✉ Ver correo</span>`:''}
    </div>
    ${sub}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">
      <div class="task-meta">${t.due?`<span class="${overdue?'overdue':''}">${overdue?'⚠ Vencida — ':''}${fmtDateShort(t.due)}</span>`:'<span style="color:var(--text-muted)">Sin fecha</span>'}</div>
      <div style="display:flex;gap:4px;" onclick="event.stopPropagation()">
        <button class="btn-ghost btn-small" onclick="toggleDone('${t.id}',event)">${t.status==='hecha'?'Reabrir':'✓ Hecha'}</button>
        <button class="btn-ghost btn-small" onclick="deleteTask('${t.id}',event)" style="color:var(--alta);">✕</button>
      </div>
    </div>
  </div>`;
}

function renderKanban(taskSet){
  const open=taskSet.filter(t=>t.status!=='hecha');
  const done=taskSet.filter(t=>t.status==='hecha');
  const urgOrd={alta:0,media:1,baja:2};
  const sortFn=(a,b)=>urgOrd[a.urgency]-urgOrd[b.urgency]||(a.due||'9999').localeCompare(b.due||'9999');
  const kanbanSort=(items,tipo)=>{
    const ord=(state.kanbanOrder||{})[tipo]||[];
    if(!ord.length) return [...items].sort(sortFn);
    return [...items].sort((a,b)=>{ const ia=ord.indexOf(a.id),ib=ord.indexOf(b.id); if(ia<0&&ib<0)return sortFn(a,b); if(ia<0)return 1; if(ib<0)return -1; return ia-ib; });
  };

  const urgent=open.filter(t=>t.urgency==='alta').sort(sortFn);

  const cols=[];
  state.tipos.forEach(tp=>{
    cols.push({title:tp, items:kanbanSort(open.filter(t=>t.tipo===tp),tp), showTipo:false, prefill:{tipo:tp}});
  });
  const sinTipo=open.filter(t=>!t.tipo || !state.tipos.includes(t.tipo)).sort(sortFn);
  if(sinTipo.length) cols.push({title:'Sin tipo', items:sinTipo, showTipo:true, prefill:{}});

  const urgentSidebar = `
    <div class="kcol-urgente-sidebar">
      <h3>⚡ Urgente <span class="count">${urgent.length}</span></h3>
      ${urgent.length ? urgent.map(t=>taskCard(t,true)).join('') : '<p class="empty" style="font-size:12px;">Nada urgente.</p>'}
      <button class="kcol-add" onclick="openTaskModal(null,JSON.parse(this.dataset.p))" data-p="${escapeAttr(JSON.stringify({urgency:'alta'}))}">+ Añadir urgente</button>
    </div>`;

  const doneSection = showDoneTasks && done.length ? `
    <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px;">
      <p class="sect-h" style="margin-bottom:8px;">Tareas cerradas</p>
      <div class="card-grid">${done.sort((a,b)=>(b.created||'').localeCompare(a.created||'')).map(t=>`
        <div class="task" style="opacity:0.72;border-left:3px solid var(--border);">
          <p class="task-title">${escapeHtml(t.title)}</p>
          <div class="badges-row">${t.urgency?`<span class="badge ${t.urgency}">${t.urgency}</span>`:''} ${t.tipo?`<span class="badge">${escapeHtml(t.tipo)}</span>`:''}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
            <span class="task-meta">${t.due?fmtDateShort(t.due):''}</span>
            <button class="btn-ghost btn-small" onclick="reopenTask('${t.id}',event)">↺ Reabrir</button>
          </div>
        </div>`).join('')}</div>
    </div>` : '';

  const mainKanban = cols.length
    ? '<div class="kanban">'+cols.map(c=>`
        <div class="kcol" data-tipo="${escapeAttr(c.title)}"
          ondragover="_kColDragOver(event,this)"
          ondragleave="_kColDragLeave(event,this)"
          ondrop="_kDrop(event,'${escapeAttr(c.title)}')">
          <h3><span class="col-drag-handle" draggable="true" ondragstart="_colDragStart(event,'${escapeAttr(c.title)}')" ondragend="_colDragEnd(event)"><i class="ti ti-grip-horizontal"></i></span>${escapeHtml(c.title)} <span class="count">${c.items.length}</span></h3>
          ${c.items.length ? c.items.map(t=>taskCard(t,c.showTipo)).join('') : '<p class="empty">Nada aquí.</p>'}
          <button class="kcol-add" onclick="openTaskModal(null,JSON.parse(this.dataset.p))" data-p="${escapeAttr(JSON.stringify(c.prefill))}">+ Añadir</button>
        </div>`).join('')+'</div>'
    : '<p class="empty">Sin tipos de tarea configurados.</p>';

  return `<div class="kanban-wrap"><div class="kanban-main">${mainKanban}${doneSection}</div>${urgentSidebar}</div>`;
}

function renderLista(){
  const order={alta:0,media:1,baja:2};
  let list=state.tasks.slice();
  if(currentUrgFilter==='hecha') list=list.filter(t=>t.status==='hecha');
  else if(currentUrgFilter!=='todas') list=list.filter(t=>t.urgency===currentUrgFilter&&t.status!=='hecha');
  else list=list.filter(t=>t.status!=='hecha');
  if(currentAreaFilter!=='todas') list=list.filter(t=>(t.areas||[]).includes(currentAreaFilter));
  if(currentTipoFilter==='sintipo') list=list.filter(t=>!t.tipo || !state.tipos.includes(t.tipo));
  else if(currentTipoFilter!=='todas') list=list.filter(t=>t.tipo===currentTipoFilter);
  list.sort((a,b)=>order[a.urgency]-order[b.urgency]||(a.due||'9999').localeCompare(b.due||'9999'));

  const urgOpts=[['todas','Todas'],['alta','Alta'],['media','Media'],['baja','Baja'],['hecha','Hechas']];
  const areaOpts=['todas'].concat(state.areas);
  const tipoOpts=['todas'].concat(state.tipos).concat(['sintipo']);
  return `
    <div class="filters"><span class="filter-label">Urgencia</span>${urgOpts.map(([k,l])=>`<button class="btn-small ${currentUrgFilter===k?'active':''}" onclick="setUrgFilter('${k}')">${l}</button>`).join('')}</div>
    <div class="filters"><span class="filter-label">Área</span>${areaOpts.map(a=>`<button class="btn-small ${currentAreaFilter===a?'active':''}" onclick="setAreaFilter('${escapeAttr(a)}')">${a==='todas'?'Todas':escapeHtml(a)}</button>`).join('')}</div>
    <div class="filters"><span class="filter-label">Tipo</span>${tipoOpts.map(t=>`<button class="btn-small ${currentTipoFilter===t?'active':''}" onclick="setTipoFilter('${escapeAttr(t)}')">${t==='todas'?'Todos':(t==='sintipo'?'Sin tipo':escapeHtml(t))}</button>`).join('')}</div>
    ${list.length ? `<div class="card-grid">${list.map(t=>taskCard(t,true)).join('')}</div>` : '<p class="empty">Nada aquí con estos filtros.</p>'}
    ${googleTasks.length ? `<div class="gtask-section-head"><svg width="14" height="14" viewBox="0 0 24 24" fill="#1a73e8"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>Google Tasks<button class="btn-ghost btn-small" onclick="fetchGoogleTasks()" style="margin-left:4px;" title="Actualizar"><i class="ti ti-refresh" style="font-size:11px;"></i></button></div><div class="card-grid">${googleTasks.map(t=>googleTaskCard(t)).join('')}</div>` : ''}`;
}

let showArchivedProjects = false;
function toggleShowArchived(){ showArchivedProjects = !showArchivedProjects; render(); }

let showDoneTasks = true;

function reopenTask(id, event){
  if(event) event.stopPropagation();
  const t = state.tasks.find(x=>x.id===id);
  if(!t) return;
  t.status = 'pendiente';
  saveTaskRow(t);
  render();
}

const DEV_AREA = 'Desarrollo digital';
function renderProyectosList(filterArea){
  const scope = filterArea ? state.projects.filter(p=>(p.areas||[]).includes(filterArea)) : state.projects;
  const addBox=`<div class="proj-add"><input type="text" id="newProjInput" placeholder="${filterArea?'Nuevo desarrollo (p. ej. Dashboard de presupuesto)...':'Nuevo proyecto (p. ej. Licitación cocina La Tebaida)...'}" onkeydown="if(event.key==='Enter'){event.preventDefault();addProject(${filterArea?`'${escapeAttr(filterArea)}'`:''});}"><button class="btn-primary btn-small" onclick="addProject(${filterArea?`'${escapeAttr(filterArea)}'`:''})">${filterArea?'Crear desarrollo':'Crear proyecto'}</button></div>`;
  const archivedCount = scope.filter(p=>!p.active).length;
  const toggleBox = `<div class="filters"><button class="btn-small ${!showArchivedProjects?'active':''}" onclick="showArchivedProjects=false; render();">Activos</button><button class="btn-small ${showArchivedProjects?'active':''}" onclick="showArchivedProjects=true; render();">Archivados (${archivedCount})</button></div>`;
  const visible = scope.filter(p=>showArchivedProjects ? !p.active : p.active);
  if(scope.length===0) return addBox+`<p class="empty">${filterArea?'No hay desarrollos todavía.':'No hay proyectos. Crea uno y entra en él para gestionar su panel y su diario.'}</p>`;
  if(visible.length===0) return addBox+toggleBox+'<p class="empty">'+(showArchivedProjects?'No hay archivados.':'No hay activos.')+'</p>';
  return addBox + toggleBox + '<div class="card-grid">' + visible.map(p=>{
    const tasks=state.tasks.filter(t=>t.projectId===p.id);
    const open=tasks.filter(t=>t.status!=='hecha');
    const urgent=open.filter(t=>t.urgency==='alta').length;
    const areaBadges=p.areas.map(a=>`<span class="badge area">${escapeHtml(a)}</span>`).join(' ');
    const lastLog=p.log.length?('Último apunte: '+fmtDateShort(p.log[0].date)):'Sin apuntes en el diario';
    return `
    <div class="proj-list-card" onclick="openProject('${p.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;">
        <h3 style="margin:0;font-size:14px;">${escapeHtml(p.name)}</h3>
        <button class="btn-ghost btn-small" style="flex-shrink:0;" onclick="toggleProjectActive('${p.id}',event)">${p.active?'Archivar':'Reactivar'}</button>
      </div>
      <div class="badges-row" style="margin-bottom:8px;">${areaBadges||'<span class="empty">Sin áreas</span>'}</div>
      <div class="proj-meta">${open.length} abiertas${urgent?' · <strong style="color:var(--alta);">'+urgent+' urgente'+(urgent>1?'s':'')+'</strong>':''} · ${tasks.length-open.length} hechas</div>
      <div class="proj-meta" style="margin-top:3px;">${lastLog}</div>
    </div>`;
  }).join('')+'</div>';
}

function renderProjectDetail(){
  const p=getProj(currentProjectId);
  if(!p) { currentProjectId=null; return renderProyectosList(); }
  const tasks=state.tasks.filter(t=>t.projectId===p.id);
  const areaChecks=state.areas.map(a=>`
    <label class="chk ${p.areas.includes(a)?'checked':''}" onclick="event.preventDefault(); toggleProjArea('${p.id}','${escapeAttr(a)}')">
      ${escapeHtml(a)}
    </label>`).join('');
  const logHtml = p.log.length ? p.log.map(e=>`
    <div class="log-entry">
      <div class="log-date">${fmtDate(e.date)} <button class="btn-ghost btn-small" onclick="deleteLogEntry('${p.id}','${e.id}')">×</button></div>
      <div class="log-text">${escapeHtml(e.text)}</div>
    </div>`).join('') : '<p class="empty">El diario está vacío. Los apuntes que hagas quedan aquí con fecha.</p>';

  return `
    <div class="proj-head">
      <h3>${escapeHtml(p.name)}
        <span style="display:flex; gap:6px;">
          <button class="btn-ghost btn-small" onclick="closeProject()">← Volver</button>
          <button class="btn-ghost btn-small" onclick="deleteProject('${p.id}',event)">Eliminar</button>
        </span>
      </h3>
      <div class="field" style="margin-bottom:0;">
        <label>Áreas del proyecto (clic para activar/desactivar)</label>
        <div class="checks">${areaChecks}</div>
      </div>
    </div>

    <p class="sect-h">Panel del proyecto</p>
    ${tasks.length ? renderKanban(tasks) : '<p class="empty">Sin tareas asignadas. Usa "+ Añadir tarea" (se asignará a este proyecto automáticamente).</p>'}

    <div class="panel-box" style="margin-top:16px;">
      <h2>Diario del proyecto</h2>
      <div class="row-flex">
        <textarea id="projLogInput" placeholder="Apunte de hoy sobre este proyecto..."></textarea>
      </div>
      <div style="margin-top:8px; display:flex; justify-content:flex-end;">
        <button class="btn-primary btn-small" onclick="addLogEntry('${p.id}')">Apuntar con fecha de hoy</button>
      </div>
      <div style="margin-top:12px;">${logHtml}</div>
    </div>`;
}

// ---- PWA: instalación y notificaciones ----
let _swReg = null;
let _installPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  const btn = document.getElementById('btnInstallApp');
  if (btn) btn.style.display = '';
});
window.addEventListener('appinstalled', () => {
  _installPrompt = null;
  const btn = document.getElementById('btnInstallApp');
  if (btn) btn.style.display = 'none';
});

function installApp(){
  if (!_installPrompt) return;
  _installPrompt.prompt();
  _installPrompt.userChoice.then(() => { _installPrompt = null; });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/TM/sw.js')
    .then(reg => { _swReg = reg; })
    .catch(() => {});
}

function _swNotify(title, body, opts = {}) {
  if (Notification.permission !== 'granted') return;
  if (_swReg) {
    _swReg.showNotification(title, {
      body,
      icon: '/TM/icon-192.png',
      badge: '/TM/icon-192.png',
      tag: opts.tag || ('tm-' + Date.now()),
      requireInteraction: opts.requireInteraction || false,
      data: { url: opts.url || location.href },
      actions: opts.actions || []
    });
  } else {
    new Notification(title, { body, icon: '/TM/icon-192.png', tag: opts.tag });
  }
}

function _swSchedule(id, delayMs, title, body, opts = {}) {
  if (Notification.permission !== 'granted') return;
  const msg = { type: 'SCHEDULE_NOTIFICATION', id, delay: delayMs, title, body, tag: id, ...opts };
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage(msg);
  } else {
    setTimeout(() => _swNotify(title, body, { tag: id, ...opts }), delayMs);
  }
}

async function initNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
  if (Notification.permission !== 'granted') return;
  scheduleTaskNotifications();
}

function scheduleTaskNotifications() {
  const today = todayStr();

  // Tareas vencidas
  const overdue = state.tasks.filter(t => t.due && t.due < today && t.status !== 'hecha');
  if (overdue.length) {
    _swNotify(
      `⚠️ ${overdue.length} tarea${overdue.length > 1 ? 's vencidas' : ' vencida'}`,
      overdue.slice(0, 3).map(t => '· ' + t.title).join('\n') + (overdue.length > 3 ? `\n· y ${overdue.length - 3} más…` : ''),
      { tag: 'tm-overdue', requireInteraction: false }
    );
  }

  // Tareas para hoy
  const dueToday = state.tasks.filter(t => t.due === today && t.status !== 'hecha');
  if (dueToday.length) {
    setTimeout(() => {
      _swNotify(
        `📋 ${dueToday.length} tarea${dueToday.length > 1 ? 's para hoy' : ' para hoy'}`,
        dueToday.slice(0, 3).map(t => '· ' + t.title).join('\n') + (dueToday.length > 3 ? `\n· y ${dueToday.length - 3} más…` : ''),
        { tag: 'tm-today', requireInteraction: false }
      );
    }, overdue.length ? 4000 : 1500);
  }
}

function scheduleMeetingNotification(ev) {
  if (!ev.start?.dateTime) return;
  const start = new Date(ev.start.dateTime).getTime();
  const now = Date.now();
  const fiveMin = 5 * 60 * 1000;
  const delay5 = start - fiveMin - now;
  const delay0 = start - now;
  const hh = new Date(ev.start.dateTime).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  const meetLink = ev.hangoutLink || _extractMeetLink(ev);
  const title = ev.summary || 'Reunión';

  if (delay5 > 0) {
    _swSchedule('meet-5-' + ev.id, delay5,
      `📅 En 5 min: ${title}`,
      `Empieza a las ${hh}` + (meetLink ? ' · Reunión online' : ''),
      { requireInteraction: !!meetLink, url: meetLink || location.href }
    );
  }
  if (delay0 > 0 && delay0 < 24 * 60 * 60 * 1000) {
    _swSchedule('meet-0-' + ev.id, delay0,
      `🔴 Ahora: ${title}`,
      `Ha comenzado a las ${hh}` + (meetLink ? ' · Entra ya' : ''),
      { requireInteraction: !!meetLink, url: meetLink || location.href }
    );
  }
}

loadState().then(() => initNotifications()).catch(() => initNotifications());
