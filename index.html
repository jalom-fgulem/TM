<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TM">
<meta name="theme-color" content="#2563EB">
<link rel="manifest" href="/TM/manifest.json">
<link rel="apple-touch-icon" href="/TM/apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="/TM/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/TM/favicon.png">
<link rel="shortcut icon" href="/TM/favicon.ico">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<title>Gestor de tareas</title>
<style>
  :root{
    --bg:#F5F5F3; --surface:#FFFFFF; --surface2:#FAFAF9;
    --border:#E5E4E0; --border-strong:#C8C7C3;
    --text:#1A1A18; --text-soft:#6B6B67; --text-muted:#A8A8A4;
    --alta:#DC2626; --alta-bg:#FEF2F2; --alta-border:#FECACA;
    --media:#D97706; --media-bg:#FFFBEB; --media-border:#FDE68A;
    --baja:#059669; --baja-bg:#ECFDF5; --baja-border:#A7F3D0;
    --accent:#2563EB; --accent-bg:#EFF6FF; --accent-border:#BFDBFE;
    --area-bg:#F3F2EF; --area-ink:#4A4A47;
    --proj:#7C3AED; --proj-bg:#F5F3FF;
    --radius:8px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;font-size:14px;scrollbar-gutter:stable;}
  .wrap{max-width:100%;margin:0 auto;padding:20px 20px 60px;}
  /* ── HEADER ──────────────────────────────── */
  .app-header{
    position:sticky;top:0;z-index:30;
    background:var(--surface);
    margin:-20px -20px 0;
    padding:0 20px;
    border-bottom:1px solid var(--border);
    display:flex;flex-direction:column;
    box-shadow:0 1px 8px rgba(0,0,0,.06);
  }
  .app-header-row1{display:flex;align-items:center;gap:11px;padding:11px 0 9px;}
  .header-logo-icon{width:36px;height:36px;flex-shrink:0;display:block;}
  .header-brand{flex:1;min-width:0;}
  .header-title{display:flex;align-items:baseline;gap:7px;line-height:1;}
  .header-title-main{font-size:16px;font-weight:700;letter-spacing:-0.02em;color:var(--text);}
  .header-title-alias{font-size:12px;font-weight:400;color:var(--text-soft);}
  h1{font-size:16px;font-weight:700;margin:0;letter-spacing:-0.02em;}
  .datebar{font-size:11px;color:var(--text-muted);text-transform:capitalize;margin-top:2px;}
  .header-btns{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .notes-btn-badge{background:var(--alta);color:#fff;border-radius:99px;padding:1px 6px;font-size:10px;font-weight:700;position:absolute;top:-5px;right:-5px;pointer-events:none;}

  /* Events row below title */
  .header-events{display:flex;flex-wrap:nowrap;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:9px;}
  .header-events:empty{display:none;}
  .header-events::-webkit-scrollbar{display:none;}
  .header-event-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:99px;color:var(--accent);font-size:11.5px;font-weight:500;white-space:nowrap;}
  .header-event-pill .ep-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .header-event-pill .ep-time{font-weight:700;font-size:11px;}
  .header-event-pill .ep-title{color:var(--text);font-weight:500;}
  .header-event-pill:hover{background:var(--accent-border);}
  .ep-day-sep{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);padding:2px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;white-space:nowrap;margin-left:6px;align-self:center;}
  .ep-day-sep:first-child{margin-left:0;}
  .ep-meet-btn{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;background:#1a73e8;color:#fff;border-radius:99px;font-size:10px;font-weight:600;text-decoration:none;margin-left:2px;}
  .ep-meet-btn:hover{background:#1557b0;color:#fff;}
  .ev-meet-link{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#e8f0fe;border:1px solid #c5d8fd;border-radius:8px;color:#1a73e8;font-weight:600;font-size:13px;text-decoration:none;margin-bottom:12px;}
  .ev-meet-link:hover{background:#d2e3fc;}
  .ev-attendees{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .ev-attendee{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:12px;border:1px solid var(--border);}
  .ev-attendee.accepted{background:#dcfce7;border-color:#86efac;color:#166534;}
  .ev-attendee.declined{background:#fee2e2;border-color:#fca5a5;color:#991b1b;text-decoration:line-through;}
  .ev-attendee.tentative{background:#fef9c3;border-color:#fde047;color:#854d0e;}
  .ev-attendee.needsAction{background:var(--surface);color:var(--text-soft);}
  .rsvp-row{display:flex;gap:8px;margin-top:8px;margin-bottom:4px;}
  .rsvp-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--border);cursor:pointer;background:var(--surface);}
  .rsvp-btn.accepted{background:#dcfce7;border-color:#86efac;color:#166534;}
  .rsvp-btn.declined{background:#fee2e2;border-color:#fca5a5;color:#991b1b;}
  .rsvp-btn.tentative{background:#fef9c3;border-color:#fde047;color:#854d0e;}

  /* Space after sticky header */
  .viewtabs{margin-top:14px;}

  /* Nav tabs */
  .viewtabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;scrollbar-width:none;}
  .viewtabs::-webkit-scrollbar{display:none;}
  .viewtabs button{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-soft);font-weight:500;font-size:13px;padding:8px 13px;cursor:pointer;display:flex;align-items:center;gap:5px;margin-bottom:-1px;white-space:nowrap;transition:color .12s;}
  .viewtabs button:hover{color:var(--text);}
  .viewtabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
  .viewtabs button i{font-size:15px;}

  /* Buttons */
  button{font-family:inherit;font-size:13px;font-weight:500;border:none;border-radius:var(--radius);padding:7px 13px;cursor:pointer;transition:all .12s;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#1d4ed8;}
  .btn-primary:disabled{background:#93c5fd;cursor:wait;}
  .btn-ghost{background:transparent;color:var(--text-soft);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--border-strong);color:var(--text);background:var(--surface2);}
  .btn-danger{background:transparent;color:var(--alta);border:1px solid var(--alta-border);}
  .btn-danger:hover{background:var(--alta-bg);}
  .btn-small{padding:4px 10px;font-size:12px;}
  .btn-icon{width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);background:transparent;border:1px solid var(--border);color:var(--text-soft);font-size:15px;}
  .btn-icon:hover{background:var(--surface2);border-color:var(--border-strong);color:var(--text);}
  .btn-icon.accent{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn-icon.accent:hover{background:#1d4ed8;}
  .btn-mic{background:var(--surface);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .btn-mic.rec{background:var(--alta-bg);border-color:var(--alta);color:var(--alta);}

  /* Forms */
  textarea,input[type=text],input[type=date],input[type=email]{width:100%;font-family:inherit;font-size:13.5px;border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;background:var(--surface);color:var(--text);}
  textarea{resize:vertical;min-height:74px;}
  textarea:focus,input:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  select{width:100%;font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);}
  .row-flex{display:flex;gap:8px;align-items:flex-start;}
  .row-flex textarea{flex:1;}

  /* Task cards */
  .task{border:1px solid var(--border);border-left:3px solid transparent;border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--surface);cursor:pointer;transition:box-shadow .12s,border-color .12s;}
  .task:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);border-color:var(--border-strong);}
  .task.alta{border-left-color:var(--alta);background:linear-gradient(90deg,rgba(220,38,38,.05) 0%,var(--surface) 70%);}
  .task.media{border-left-color:var(--media);}
  .task.baja{border-left-color:var(--baja);}
  .task.done{opacity:0.45;}
  .task-title{font-size:13.5px;font-weight:500;margin:0 0 5px;line-height:1.35;color:var(--text);}
  .task-title.done{text-decoration:line-through;}
  .task-meta{font-size:11.5px;color:var(--text-soft);margin-top:5px;}
  .overdue{color:var(--alta);font-weight:600;}
  .subprogress{font-size:11px;color:var(--text-soft);margin-top:4px;}
  .sub-list{margin:0 0 6px;padding:0;list-style:none;}
  .sub-list li{display:flex;align-items:center;gap:7px;font-size:12.5px;padding:3px 0;border-bottom:1px solid var(--border);}
  .sub-list li span.done{text-decoration:line-through;color:var(--text-soft);}
  .sub-list li button{margin-left:auto;}
  .sub-add{display:flex;gap:6px;}
  .sub-add input{flex:1;}

  /* Badges */
  .badges-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
  .badge{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:99px;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;}
  .badge.alta{background:var(--alta-bg);color:var(--alta);border:1px solid var(--alta-border);}
  .badge.media{background:var(--media-bg);color:var(--media);border:1px solid var(--media-border);}
  .badge.baja{background:var(--baja-bg);color:var(--baja);border:1px solid var(--baja-border);}
  .badge.area{background:var(--area-bg);color:var(--area-ink);}
  .badge.tipo{background:var(--accent-bg);color:var(--accent);}
  .badge.proj{background:var(--proj-bg);color:var(--proj);}
  .badge.link{background:var(--accent-bg);color:var(--accent);}
  .linked-incoming{font-size:11.5px;color:var(--text-soft);margin-bottom:6px;padding:5px 9px;background:var(--accent-bg);border-radius:6px;border-left:3px solid var(--accent);}

  /* Kanban */
  .kanban-wrap{display:flex;gap:14px;align-items:start;}
  .kanban-main{flex:1;min-width:0;}
  .kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;align-items:start;}
  .kcol{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;min-height:80px;}
  .kcol h3{font-size:11px;text-transform:uppercase;letter-spacing:.07em;margin:0 0 10px;font-weight:700;display:flex;justify-content:space-between;align-items:center;color:var(--text-soft);}
  .kcol .count{font-size:10px;background:var(--bg);color:var(--text-soft);border-radius:99px;padding:1px 7px;font-weight:600;border:1px solid var(--border);}
  .kcol-urgente-sidebar{width:250px;flex-shrink:0;background:var(--alta-bg);border:2px solid var(--alta-border);border-top:3px solid var(--alta);border-radius:12px;padding:12px;align-self:start;}
  .kcol-urgente-sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.07em;margin:0 0 10px;font-weight:700;display:flex;justify-content:space-between;align-items:center;color:var(--alta);}
  .kcol-urgente-sidebar .count{font-size:10px;background:#fff;color:var(--alta);border-radius:99px;padding:1px 7px;font-weight:700;border:1px solid var(--alta-border);}
  .kcol-urgente-sidebar .task{border-left:3px solid var(--alta);}
  .kcol-add{width:100%;padding:6px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer;text-align:center;margin-top:4px;}
  .kcol-add:hover{background:var(--surface);color:var(--text-soft);}
  /* Drag & drop — kanban cards */
  .task[draggable=true]{cursor:grab;}
  .task.k-dragging{opacity:0.3;pointer-events:none;}
  .kcol.k-drag-over,.kcol-urgente-sidebar.k-drag-over{background:var(--accent-bg);outline:2px solid var(--accent-border);outline-offset:-2px;}
  .task.k-drop-above{box-shadow:0 -3px 0 var(--accent);}
  .task.k-drop-below{box-shadow:0 3px 0 var(--accent);}
  .task-drag-handle{cursor:grab;color:var(--text-muted);font-size:12px;opacity:0;flex-shrink:0;padding:1px 4px 0 0;line-height:1;display:inline-flex;}
  .task:hover .task-drag-handle{opacity:0.5;}
  /* Drag & drop — kanban columns */
  .kcol.col-dragging{opacity:0.35;outline:2px dashed var(--border);}
  .kcol.col-drop-left{box-shadow:-4px 0 0 var(--accent);}
  .kcol.col-drop-right{box-shadow:4px 0 0 var(--accent);}
  .col-drag-handle{cursor:grab;color:var(--text-muted);font-size:13px;opacity:0;margin-right:5px;line-height:1;flex-shrink:0;}
  .kcol h3:hover .col-drag-handle{opacity:0.6;}
  .col-drag-handle:hover{opacity:1!important;color:var(--text);}
  /* Drag & drop — subtareas */
  .sub-drag-handle{cursor:grab;color:var(--text-muted);font-size:11px;opacity:0;padding:0 4px 0 0;user-select:none;flex-shrink:0;}
  li:hover .sub-drag-handle,.sub-item.s-dragging .sub-drag-handle{opacity:0.5;}
  li.s-dragging{opacity:0.3;}
  li.s-drop-above{box-shadow:0 -2px 0 var(--accent);}
  li.s-drop-below{box-shadow:0 2px 0 var(--accent);}

  /* Filters */
  .filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center;}
  .filters button{background:var(--surface);border:1px solid var(--border);color:var(--text-soft);font-weight:500;font-size:12px;padding:4px 10px;}
  .filters button.active{background:var(--text);color:#fff;border-color:var(--text);}
  .filter-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-right:4px;align-self:center;}

  /* Panel box */
  .panel-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .panel-box h2,.sect-h{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-soft);margin:0 0 10px;font-weight:700;}
  .help{font-size:12px;color:var(--text-soft);margin:0 0 8px;line-height:1.45;}
  .empty{font-size:12.5px;color:var(--text-muted);font-style:italic;padding:6px 0;}

  /* Projects */
  .proj-list-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:box-shadow .12s,border-color .12s;}
  .proj-list-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.07);border-color:var(--border-strong);}
  .proj-list-card h3{font-size:15px;font-weight:600;margin:0 0 5px;color:var(--text);}
  .proj-list-card .proj-meta{font-size:12px;color:var(--text-soft);}
  .proj-add{display:flex;gap:6px;margin-bottom:14px;}
  .proj-add input{flex:1;}
  .proj-head{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--proj);border-radius:12px;padding:16px;margin-bottom:14px;}
  .proj-head h3{font-size:18px;font-weight:600;margin:0 0 6px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;}
  .log-entry{border-bottom:1px solid var(--border);padding:9px 0;}
  .log-entry:last-child{border-bottom:none;}
  .log-date{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--proj);font-weight:700;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;}
  .log-text{font-size:14px;line-height:1.45;white-space:pre-wrap;}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;overflow-y:auto;}
  .modal{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);}
  .modal h3{margin:0 0 16px;font-size:17px;font-weight:600;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-soft);margin-bottom:4px;font-weight:600;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .checks{display:flex;flex-wrap:wrap;gap:5px;}
  .chk{display:inline-flex;align-items:center;gap:5px;font-size:12px;border:1px solid var(--border);border-radius:99px;padding:4px 10px;background:var(--surface2);cursor:pointer;}
  .chk input{margin:0;}
  .chk.checked{background:var(--area-bg);border-color:var(--area-ink);}

  /* Notes */
  .note-item{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--surface);}
  .note-item p{margin:0 0 6px;font-size:13px;line-height:1.4;}
  .note-meta{font-size:11px;color:var(--text-soft);margin-bottom:6px;}
  .note-actions{display:flex;gap:5px;flex-wrap:wrap;}

  /* Misc */
  .status-msg{font-size:12px;color:var(--text-soft);margin-top:10px;min-height:16px;}
  .area-manage{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
  .area-chip{display:flex;align-items:center;gap:5px;font-size:11.5px;background:var(--area-bg);color:var(--area-ink);border-radius:99px;padding:4px 5px 4px 9px;}
  .area-chip button{background:none;border:none;color:var(--area-ink);font-weight:700;padding:0 4px;cursor:pointer;font-size:13px;line-height:1;}
  .area-add{display:flex;gap:6px;}
  .area-add input{flex:1;}
  details.manage summary{cursor:pointer;font-size:12px;color:var(--text-soft);margin-bottom:8px;}
  details.manage{margin-bottom:12px;}

  /* Drawers */
  .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:40;}
  .drawer-overlay.open{display:block;}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:95vw;background:#fff;border-left:1px solid var(--border);z-index:45;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
  .drawer.open{transform:translateX(0);}
  .drawer-head{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .drawer-head h3{margin:0;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-soft);}
  .drawer-body{padding:18px 20px;overflow-y:auto;flex:1;}
  .cfg-sect{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-soft);margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
  .cfg-sect:first-child{margin-top:0;}
  .cfg-actions{display:flex;flex-direction:column;gap:7px;}
  .cfg-fields{display:flex;flex-direction:column;gap:7px;}
  .cfg-fields label{font-size:11px;font-weight:600;color:var(--text-soft);margin-top:4px;}
  .cfg-fields input{font-size:13px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);width:100%;}
  .cfg-fields input:focus{outline:none;border-color:var(--accent);}
  .area-edit-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
  .area-edit-input{flex:1;font-size:13px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);}
  .area-edit-input:focus{outline:none;border-color:var(--accent);}
  .area-del-btn{flex-shrink:0;background:none;border:none;cursor:pointer;color:var(--text-soft);font-size:15px;line-height:1;padding:2px 4px;}

  /* Google / Calendar / Email */
  .google-connected{font-size:12px;color:#065f46;background:#d1fae5;padding:6px 10px;border-radius:var(--radius);border:1px solid #a7f3d0;margin-bottom:6px;}
  .agenda-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:700px){.agenda-grid{grid-template-columns:1fr;}}
  .agenda-sect-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .agenda-sect-head h2{margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-soft);}
  .agenda-day{margin-bottom:14px;}
  .agenda-day-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-soft);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--border);}
  .agenda-event{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;transition:border-color .1s;}
  .agenda-event:hover{border-color:var(--border-strong);}
  .agenda-event-time{font-size:11.5px;color:var(--text-soft);white-space:nowrap;min-width:52px;}
  .agenda-event-title{font-size:13px;font-weight:500;}
  /* Gmail 3-column layout */
  .gmail-layout{display:grid;grid-template-columns:170px 280px 1fr;border:1px solid var(--border);border-radius:10px;overflow:hidden;height:calc(100dvh - 158px);min-height:360px;background:var(--surface);}
  .gmail-sidebar{overflow-y:auto;border-right:1px solid var(--border);background:var(--bg);padding:6px 4px;}
  .gmail-sb-item{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text-soft);user-select:none;transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gmail-sb-item:hover{background:var(--surface);}
  .gmail-sb-item.active{background:var(--accent-bg);color:var(--accent);font-weight:600;}
  .gmail-sb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .gmail-sb-sep{height:1px;background:var(--border);margin:5px 6px;}
  .gmail-sb-section{font-size:10px;font-weight:600;color:var(--text-soft);text-transform:uppercase;letter-spacing:.05em;padding:8px 10px 3px;}
  .gmail-list-col{overflow-y:auto;border-right:1px solid var(--border);display:flex;flex-direction:column;}
  .gmail-list-head{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;flex-shrink:0;}
  .gmail-list-head-title{font-size:12px;font-weight:600;}
  .gmail-list-item{padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
  .gmail-list-item:hover{background:var(--bg);}
  .gmail-list-item.selected{background:var(--accent-bg);}
  .gli-row1{display:flex;align-items:baseline;justify-content:space-between;gap:4px;margin-bottom:2px;}
  .gli-from{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
  .gli-from.bold{font-weight:700;}
  .gli-date{font-size:10.5px;color:var(--text-soft);white-space:nowrap;flex-shrink:0;}
  .gli-subject{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
  .gli-subject.bold{font-weight:600;}
  .gli-snippet{font-size:11px;color:var(--text-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;}
  .gmail-preview-col{display:flex;flex-direction:column;overflow:hidden;}
  .gmail-preview-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-soft);font-size:13px;gap:8px;}
  .gmail-preview-head{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .gmail-preview-subject{font-size:15px;font-weight:700;line-height:1.35;margin-bottom:7px;}
  .gmail-preview-meta{font-size:11.5px;color:var(--text-soft);line-height:1.8;}
  .gmail-preview-actions{display:flex;gap:6px;margin-top:9px;}
  .gmail-preview-body{flex:1;overflow-y:auto;padding:14px 16px;}
  .gmail-preview-iframe{width:100%;border:none;display:block;}
  @media(max-width:860px){.gmail-layout{grid-template-columns:150px 1fr;height:calc(100dvh - 148px);}  .gmail-preview-col{display:none;}}
  @media(max-width:600px){.gmail-layout{grid-template-columns:1fr;height:auto;min-height:0;} .gmail-sidebar{display:none;} .gmail-list-col{border-right:none;max-height:60vh;}}
  .agenda-connect{text-align:center;padding:48px 20px;}
  .agenda-connect p{margin-bottom:14px;font-size:14px;color:var(--text-soft);}
  .cal-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .cal-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 6px;border-radius:99px;border:1px solid var(--border);background:var(--surface);font-size:12px;cursor:pointer;color:var(--text-soft);user-select:none;transition:all .1s;}
  .cal-chip.on{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);font-weight:500;}
  .cal-chip:hover{border-color:var(--border-strong);}
  .cal-chip-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  /* CRM */
  .crm-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:box-shadow .12s,border-color .12s;}
  .crm-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:var(--border-strong);}
  .crm-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent);flex-shrink:0;text-transform:uppercase;}

  /* Layout */
  .layout{display:grid;grid-template-columns:300px 1fr;gap:18px;}
  @media(max-width:820px){.layout{grid-template-columns:1fr;}}
  .view-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .view-header h2{font-size:14px;font-weight:600;color:var(--text);margin:0;}

  /* Card grid — usado en Lista, Reuniones, Proyectos, CRM */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-top:4px;}

  /* Modal ancho */
  .modal-wide{max-width:680px;}

  /* Campos en 2 columnas dentro del modal */
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  /* Separadores de sección dentro del modal */
  .modal-sect{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);}

  /* Toggles de área (sustituyen a .chk en el modal de tarea) */
  .area-toggles{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;}
  .area-toggle{display:flex;align-items:center;gap:7px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;background:var(--surface2);transition:background .1s,border-color .1s;user-select:none;}
  .area-toggle input[type=checkbox]{display:none;}
  .area-toggle-icon{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all .1s;}
  .area-toggle.checked{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);}
  .area-toggle.checked .area-toggle-icon{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* Config accordion */
  .cfg-accordion{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
  .cfg-acc-summary{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);background:var(--surface);list-style:none;user-select:none;}
  .cfg-acc-summary::-webkit-details-marker{display:none;}
  .cfg-acc-summary:hover{background:var(--surface2);}
  .cfg-acc-summary .cfg-acc-icon{font-size:16px;transition:transform .2s;}
  details.cfg-accordion[open] .cfg-acc-icon{transform:rotate(180deg);}
  .cfg-acc-body{padding:12px 14px;border-top:1px solid var(--border);background:var(--surface);}

  /* Header events strip */
  .header-events{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
  .header-event-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:99px;color:var(--accent);font-size:11px;font-weight:500;white-space:nowrap;}
  .header-event-pill i{font-size:12px;}

  /* Calendar layout with sidebar */
  .cal-layout{display:flex;gap:0;align-items:flex-start;}
  .cal-sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--border);padding:10px 8px 20px;display:flex;flex-direction:column;gap:14px;min-height:calc(100vh - 150px);overflow-y:auto;}
  .cal-main{flex:1;min-width:0;padding-left:14px;overflow-x:auto;}
  /* Mini calendar */
  .cal-mini{}
  .cal-mini-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .cal-mini-title{font-size:11.5px;font-weight:600;color:var(--text);text-transform:capitalize;}
  .cal-mini-arr{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:2px 3px;border-radius:4px;line-height:1;font-size:13px;}
  .cal-mini-arr:hover{background:var(--surface2);}
  .cal-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
  .cal-mini-dow{font-size:9px;font-weight:700;color:var(--text-muted);text-align:center;padding:2px 0;text-transform:uppercase;}
  .cal-mini-day{font-size:10.5px;text-align:center;padding:3px 1px;border-radius:50%;cursor:pointer;color:var(--text);aspect-ratio:1;display:flex;align-items:center;justify-content:center;min-width:22px;}
  .cal-mini-day:hover:not(.mini-today){background:var(--surface2);}
  .cal-mini-day.mini-today{background:var(--accent);color:#fff;font-weight:700;}
  .cal-mini-day.mini-sel:not(.mini-today){outline:2px solid var(--accent);outline-offset:-2px;}
  .cal-mini-day.other{opacity:0.35;cursor:default;}
  /* Sidebar calendar list */
  .cal-list-group{margin-bottom:6px;}
  .cal-list-group-title{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);padding:0 4px;margin-bottom:4px;}
  .cal-list-item{display:flex;align-items:center;gap:7px;padding:3px 6px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text);min-height:26px;}
  .cal-list-item:hover{background:var(--surface2);}
  .cal-list-check{width:14px;height:14px;border-radius:3px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s;}
  .cal-list-check::after{content:'';display:block;width:7px;height:7px;border-radius:1px;}
  .cal-list-check.on{border-color:transparent;}
  .cal-list-check.on::after{content:'✓';font-size:9px;color:#fff;font-weight:800;width:auto;height:auto;}
  .cal-list-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cal-list-rename{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:1px 3px;border-radius:3px;opacity:0;font-size:10px;line-height:1;flex-shrink:0;}
  .cal-list-item:hover .cal-list-rename{opacity:1;}
  .cal-list-rename:hover{color:var(--text);background:var(--surface2);}
  /* Monthly calendar */
  .cal-month{width:100%;}
  .cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .cal-nav-label{flex:1;text-align:center;font-size:15px;font-weight:600;text-transform:capitalize;}
  .cal-grid{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .cal-dow-row{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:var(--surface2);border-bottom:1px solid var(--border);}
  .cal-month-week{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));}
  .cal-month-week:last-child .cal-day{border-bottom:none;}
  .cal-spans-container{grid-column:1/-1;grid-row:1;background:var(--surface);padding:2px 0;}
  .cal-spans-inner{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));}
  .cal-span-bar{height:20px;border-radius:4px;padding:0 6px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:flex;align-items:center;margin:1px 2px;color:#fff;background:#7c3aed;}
  .cal-span-bar.alta{background:#ef4444;}
  .cal-span-bar.media{background:#f59e0b;}
  .cal-span-bar.baja{background:#22c55e;}
  .cal-span-bar.cont-before{border-radius:0 4px 4px 0;margin-left:0;}
  .cal-span-bar.cont-after{border-radius:4px 0 0 4px;margin-right:0;}
  .cal-span-bar.cont-both{border-radius:0;margin:1px 0;}
  .cal-week-allday-strip{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border);background:var(--surface);min-height:0;}
  .cal-week-allday-strip:empty,.cal-week-allday-strip-empty{display:none;}
  .cal-dow{text-align:center;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);padding:4px 0 6px;}
  .cal-day{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px 4px 4px;min-height:110px;cursor:pointer;background:var(--surface);transition:background .1s;}
  .cal-day:nth-child(7n){border-right:none;}
  .cal-day:hover{background:var(--surface2);}
  .cal-day.today{background:var(--accent-bg);}
  .cal-day.today .cal-day-num span{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;}
  .cal-day.selected .cal-day-num span{outline:2px solid var(--accent);border-radius:50%;}
  .cal-day.other-month{background:var(--surface2);opacity:0.55;cursor:default;}
  .cal-day-num{font-size:12px;font-weight:500;margin-bottom:3px;color:var(--text);text-align:center;}
  /* Google Calendar–style event rows */
  .cal-ev-row{display:flex;align-items:center;gap:4px;font-size:11px;line-height:1.35;padding:1px 3px;border-radius:3px;cursor:pointer;overflow:hidden;white-space:nowrap;margin-bottom:1px;color:var(--text);}
  .cal-ev-row:hover{background:var(--surface2);}
  .cal-ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .cal-ev-time{color:var(--text-muted);font-size:10px;flex-shrink:0;}
  .cal-ev-title{overflow:hidden;text-overflow:ellipsis;flex:1;}
  .cal-ev-row.missing-agenda{opacity:0.4;font-style:italic;}
  .cal-event-more{font-size:10.5px;color:var(--accent);padding:1px 3px;cursor:pointer;}
  .cal-event-more:hover{text-decoration:underline;}
  .cal-day-detail{margin-top:14px;border-top:1px solid var(--border);padding-top:14px;}
  .cal-day-detail-head{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--text-soft);margin-bottom:10px;text-transform:capitalize;}
  /* Calendar view switcher */
  .cal-view-tabs{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:2px;margin-left:auto;}
  .cal-view-tab{padding:3px 11px;border-radius:5px;font-size:12px;font-weight:500;color:var(--text-soft);cursor:pointer;border:none;background:transparent;transition:all .1s;}
  .cal-view-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
  /* Week view */
  .cal-week-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;}
  .cal-week-col-head{text-align:center;padding:5px 2px 3px;border-radius:7px 7px 0 0;background:var(--bg);}
  .cal-week-col-head.today-col{background:var(--accent-bg);}
  .cal-week-col-head-name{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-soft);}
  .cal-week-col-head-day{font-size:18px;font-weight:700;line-height:1.2;color:var(--text);}
  .cal-week-col-head.today-col .cal-week-col-head-day{color:var(--accent);}
  .cal-week-col-body{border:1px solid var(--border);border-top:none;border-radius:0 0 7px 7px;padding:4px;min-height:160px;background:var(--surface);}
  .cal-week-event{font-size:10.5px;padding:2px 5px;border-radius:3px;margin-bottom:3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* Day view */
  .cal-day-event-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;}
  .cal-day-event-time{font-size:12px;font-weight:600;color:var(--text-soft);min-width:100px;flex-shrink:0;}
  .cal-day-event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;}
  .cal-day-event-info{flex:1;min-width:0;}
  .cal-day-event-title{font-size:13px;font-weight:500;}
  .cal-day-event-calname{font-size:11px;color:var(--text-soft);}
  /* Google Tasks */
  .gtask-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;color:#1a73e8;background:#e8f0fe;border-radius:4px;padding:1px 6px;flex-shrink:0;}
  .gtask-card{background:var(--surface);border:1px solid #c5d8fd;border-left:3px solid #1a73e8;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;cursor:default;}
  .gtask-card-title{font-size:13px;font-weight:500;color:var(--text);}
  .gtask-card-meta{font-size:11px;color:var(--text-soft);}
  .gtask-cal-pill{font-size:10px;padding:1px 5px;border-radius:3px;margin-bottom:2px;border-left:2px solid #1a73e8;background:rgba(26,115,232,.12);color:#1557b0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
  .gtask-day-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:#e8f0fe;border:1px solid #c5d8fd;border-left:3px solid #1a73e8;border-radius:8px;margin-bottom:7px;}
  .gtask-day-row-info{flex:1;min-width:0;}
  .gtask-day-row-label{font-size:10.5px;font-weight:600;color:#1a73e8;margin-bottom:2px;}
  .gtask-day-row-title{font-size:13px;font-weight:500;color:var(--text);}
  .gtask-section-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#1a73e8;margin:14px 0 8px;display:flex;align-items:center;gap:6px;}
  .ltask-cal-pill{font-size:10px;padding:1px 5px;border-radius:3px;margin-bottom:2px;border-left:2px solid #7c3aed;background:rgba(124,58,237,.1);color:#5b21b6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;cursor:pointer;}
  .ltask-cal-pill:hover{background:rgba(124,58,237,.18);}
  .ltask-cal-pill.alta{border-left-color:#ef4444;background:rgba(239,68,68,.08);color:#b91c1c;}
  .ltask-cal-pill.media{border-left-color:#f59e0b;background:rgba(245,158,11,.08);color:#92400e;}
  .ltask-cal-pill.baja{border-left-color:#22c55e;background:rgba(34,197,94,.08);color:#15803d;}
  .ltask-day-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.2);border-left:3px solid #7c3aed;border-radius:8px;margin-bottom:7px;cursor:pointer;}
  .ltask-day-row:hover{background:rgba(124,58,237,.12);}
  .ltask-day-row.alta{border-left-color:#ef4444;background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2);}
  .ltask-day-row.media{border-left-color:#f59e0b;background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2);}
  .ltask-day-row.baja{border-left-color:#22c55e;background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2);}
  .ltask-cal-pill.span-start{border-radius:4px 0 0 4px;border-right:none;margin-right:-1px;}
  .ltask-cal-pill.span-mid{border-radius:0;border-left:none;border-right:none;margin:0 -1px;opacity:.85;}
  .ltask-cal-pill.span-end{border-radius:0 4px 4px 0;border-left:none;margin-left:-1px;}
  .ltask-day-row.span-mid{opacity:.8;border-left-style:dashed;}
  .ltask-day-row.span-end{border-left-style:dashed;}
  .ltask-cal-pill.overdue,.gtask-cal-pill.overdue{border-left-color:#ef4444;background:rgba(239,68,68,.18);color:#b91c1c;font-weight:700;animation:overdue-pulse 2s ease-in-out infinite;}
  .ltask-day-row.overdue,.gtask-day-row.overdue{border-left-color:#ef4444;background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);animation:overdue-pulse 2s ease-in-out infinite;}
  @keyframes overdue-pulse{0%,100%{opacity:1;}50%{opacity:.65;}}

  /* Google Tasks view */
  .gtasks-layout{display:grid;grid-template-columns:200px 1fr;border:1px solid var(--border);border-radius:10px;overflow:hidden;height:calc(100dvh - 158px);min-height:360px;background:var(--surface);}
  .gtl-sidebar{overflow-y:auto;border-right:1px solid var(--border);background:var(--bg);padding:6px 4px;}
  .gtl-sidebar-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-soft);padding:8px 10px 4px;}
  .gtl-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .12s;}
  .gtl-item:hover{background:var(--hover);}
  .gtl-item.active{background:#e8f0fe;color:#1a73e8;font-weight:600;}
  .gtl-item-icon{width:16px;height:16px;flex-shrink:0;opacity:.6;}
  .gtl-main{display:flex;flex-direction:column;overflow:hidden;}
  .gtl-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px;flex-shrink:0;}
  .gtl-header-title{font-size:15px;font-weight:600;color:var(--text);}

  .gtl-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}

  .gtl-card.linked{border:2px solid #f59e0b;border-left:4px solid #f59e0b;background:linear-gradient(135deg,#fffbeb 0%,var(--surface) 60%);}
  .gtl-card.linked:hover{box-shadow:0 2px 12px rgba(245,158,11,.25);border-color:#fbbf24;}

  .email-filter-btn.active{background:var(--text);color:#fff;border-color:var(--text);}

  /* ── RESPONSIVE ─────────────────────────── */
  @media(max-width:600px){
    /* Contenedor */
    .wrap{padding:10px 10px 90px;}

    /* Cabecera responsive */
    h1,.header-title-main{font-size:14px;}

    /* Kanban: scroll horizontal, columnas fijas */

    .filters{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}

    .layout{grid-template-columns:1fr;}

  }

const STORAGE_KEY = 'tablero-fgulem-datos';
const SUPABASE_URL = 'https://awnitqzydpqvbjxqgjfk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3cqXbZ0mntG4tGgqzVA3JQ_xNWHlmbJ';
const DEFAULT_AREAS = ['Desarrollo profesional','Formación y congresos','Transferencia e innovación','Encargos de gestión','Desarrollo digital','Servicios generales','Dirección / Transversal'];
const DEFAULT_TIPOS = ['Correo pendiente','Llamada','Reunión por montar','Tema general'];
const DEFAULT_PROFILE = { nombre:'', apellidos:'', alias:'', email:'', cargo:'' };
let state = { notes:[], tasks:[], areas:DEFAULT_AREAS.slice(), tipos:DEFAULT_TIPOS.slice(), projects:[], meetings:[], contacts:[], profile:{...DEFAULT_PROFILE} };
let currentPersonFilter = null;
let tempParticipants = [];
let meetingDraftStash = null;

let currentAreaFilter = 'todas';
let currentTipoFilter = 'todas';
let tempSubtasks = [];
let tempExpectedParticipants = [];
let tempLinkedTaskIds = [];
let tempSourceEmailId = null;

const monthsEs = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function fmtDate(d){ const dt=new Date(d+'T00:00:00'); return dt.getDate()+' de '+monthsEs[dt.getMonth()]+' de '+dt.getFullYear(); }
function fmtDateShort(d){ const dt=new Date(d+'T00:00:00'); return dt.getDate()+' de '+monthsEs[dt.getMonth()]; }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
// Returns 'single'|'start'|'mid'|'end'|false for a task on a given dateStr
function taskSpanPos(t, dateStr){
  if(!t.due) return false;
  const s = t.start || t.due;
  if(dateStr < s || dateStr > t.due) return false;
  if(s === t.due || !t.start) return 'single';
  if(dateStr === s) return 'start';
  if(dateStr === t.due) return 'end';
  return 'mid';
}
document.getElementById('datebar').textContent = new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function setStatus(msg){
  const el=document.getElementById('statusMsg'); el.textContent=msg;
  if(msg) setTimeout(()=>{ if(el.textContent===msg) el.textContent=''; },3500);
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function escapeHtml(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escapeAttr(s){ return escapeHtml(s).replace(/"/g,'&quot;'); }
function getProj(id){ return state.projects.find(x=>x.id===id) || null; }
function projName(id){ const p=getProj(id); return p?p.name:null; }

async function fetchTable(table, orderDir){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=data&order=id.${orderDir}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const rows = await res.json();
  return rows.map(r=>r.data);
}
async function upsertRow(table, id, data){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify([{ id, data, updated_at: new Date().toISOString() }])
  });
  if(!res.ok) setStatus('No se pudo guardar (HTTP '+res.status+'). Reintenta.');
}
async function deleteRow(table, id){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) setStatus('No se pudo borrar (HTTP '+res.status+'). Reintenta.');
}
function saveTaskRow(t){ return upsertRow('tasks', t.id, t); }
function deleteTaskRow(id){ return deleteRow('tasks', id); }
function saveProjectRow(p){ return upsertRow('projects', p.id, p); }
function deleteProjectRow(id){ return deleteRow('projects', id); }
function saveMeetingRow(m){ return upsertRow('meetings', m.id, m); }
function deleteMeetingRow(id){ return deleteRow('meetings', id); }
function saveContactRow(c){ return upsertRow('contacts', c.id, c); }
function deleteContactRow(id){ return deleteRow('contacts', id); }
function saveNoteRow(n){ return upsertRow('notes', n.id, n); }
function deleteNoteRow(id){ return deleteRow('notes', id); }
function saveSettings(){ return upsertRow('board', STORAGE_KEY, { areas: state.areas, tipos: state.tipos, profile: state.profile, calendarSelection: state.calendarSelection||{}, calendarConfig: state.calendarConfig||{}, kanbanOrder: state.kanbanOrder||{} }); }

async function loadState(){
  setStatus('Cargando...');
  try{
    const [tasks, projects, meetings, contacts, notes, boardRes] = await Promise.all([
      fetchTable('tasks','desc'),
      fetchTable('projects','asc'),
      fetchTable('meetings','desc'),
      fetchTable('contacts','asc'),
      fetchTable('notes','desc'),
      fetch(`${SUPABASE_URL}/rest/v1/board?id=eq.${STORAGE_KEY}&select=data`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      }).then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    ]);
    const settings = (boardRes && boardRes.length && boardRes[0].data) ? boardRes[0].data : {};
    state = {
      tasks, projects, meetings, contacts, notes,
      areas: (settings.areas && settings.areas.length) ? settings.areas : DEFAULT_AREAS.slice(),
      tipos: (settings.tipos && settings.tipos.length) ? settings.tipos : DEFAULT_TIPOS.slice(),
      profile: settings.profile || {...DEFAULT_PROFILE},
      calendarSelection: settings.calendarSelection || {},
      calendarConfig: settings.calendarConfig || {},
      kanbanOrder: settings.kanbanOrder || {}
    };
    state.tasks.forEach(t=>{ if(!t.subtasks) t.subtasks=[]; t.subtasks.forEach(s=>{ if(!s.children) s.children=[]; }); if(!t.linkedTaskIds) t.linkedTaskIds=[]; });
    state.projects.forEach(p=>{ if(!p.areas) p.areas=[]; if(!p.log) p.log=[]; if(p.active===undefined) p.active=true; });
    setStatus('');
  }catch(e){
    setStatus('Error al cargar los datos.');
  }
  updateAppTitle();
  render();
}

// ---- Dictado por voz ----
let _dictRec = null;
function startDictation(targetId, btnId){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ setStatus('El dictado no está disponible en este navegador. Prueba con Chrome.'); return; }
  if(_dictRec){ _dictRec.stop(); return; }
  const btn = document.getElementById(btnId);
  _dictRec = new SR();
  _dictRec.lang = 'es-ES';
  _dictRec.continuous = true;
  _dictRec.interimResults = false;
  _dictRec.onstart = ()=>{ if(btn) btn.classList.add('rec'); setStatus('Dictando… pulsa el micrófono para detener.'); };
  _dictRec.onresult = e=>{
    const el = document.getElementById(targetId); if(!el) return;
    let txt = '';
    for(let i=e.resultIndex;i<e.results.length;i++) if(e.results[i].isFinal) txt+=e.results[i][0].transcript;
    if(txt){ const sep=el.value&&!/\s$/.test(el.value)?' ':''; el.value+=sep+txt; }
  };
  _dictRec.onerror = e=>{ if(e.error!=='aborted') setStatus('Error de micrófono: '+e.error); };
  _dictRec.onend = ()=>{ if(btn) btn.classList.remove('rec'); _dictRec=null; setStatus(''); };
  _dictRec.start();
}

function saveTask(taskId, fromNoteId){
  const title=document.getElementById('mTitle').value.trim();
  if(!title){ setStatus('El título no puede estar vacío.'); return; }
  const areas=Array.from(document.querySelectorAll('#mAreas input:checked')).map(el=>el.value);
  const projectId=document.getElementById('mProject').value || null;
  const tipo=document.getElementById('mTipo').value;
  const urgency=document.getElementById('mUrgency').value;
  const due=document.getElementById('mDue').value;
  const start=document.getElementById('mStart')?.value||'';
  const context=document.getElementById('mContext').value.trim();
  const subtasks=JSON.parse(JSON.stringify(tempSubtasks));
  const expectedParticipants=tempExpectedParticipants.slice();
  const callWith=document.getElementById('mCallWith').value.trim();

  const linkedTaskIds=tempLinkedTaskIds.slice();
  let t;
  if(taskId){
    t=state.tasks.find(x=>x.id===taskId);
    Object.assign(t,{title,areas,projectId,tipo,urgency,due,start,context,subtasks,expectedParticipants,callWith,linkedTaskIds});
  } else {
    t={id:uid(),title,areas,projectId,tipo,urgency,due,start,context,subtasks,expectedParticipants,callWith,linkedTaskIds,status:'pendiente',created:todayStr(),...(tempSourceEmailId?{sourceEmailId:tempSourceEmailId}:{})};
    state.tasks.unshift(t);
  }
  if(fromNoteId){ state.notes=state.notes.filter(n=>n.id!==fromNoteId); deleteNoteRow(fromNoteId); }
  saveTaskRow(t);

  // Google sync — create new Google Task
  const syncTask = document.getElementById('gSyncTask');
  if(syncTask?.checked){
    const listId = document.getElementById('gSyncTaskList')?.value;
    if(listId && googleToken){
      const body = {title};
      if(due) body.due = due+'T00:00:00.000Z';
      if(context) body.notes = context;
      fetch(`https://tasks.googleapis.com/tasks/v1/lists/${encodeURIComponent(listId)}/tasks`,{
        method:'POST', headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'}, body:JSON.stringify(body)
      }).then(r=>r.ok?r.json():null).then(nt=>{
        if(nt){
          googleTasks.unshift({...nt,_listId:listId,_listTitle:googleTaskLists.find(l=>l.id===listId)?.title||''});
          t.gTaskId = nt.id;
          t.gTaskListId = listId;
          saveTaskRow(t);
          setStatus('Tarea guardada y vinculada con Google Tasks.');
        }
      }).catch(()=>{});
    }
  } else if(t.gTaskId && t.gTaskListId && googleToken){
    // Sync changes back to linked Google Task
    const gBody = {title};
    if(due) gBody.due = due+'T00:00:00.000Z'; else gBody.due = null;
    if(context) gBody.notes = context;
    fetch(`https://tasks.googleapis.com/tasks/v1/lists/${encodeURIComponent(t.gTaskListId)}/tasks/${encodeURIComponent(t.gTaskId)}`,{
      method:'PATCH', headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'}, body:JSON.stringify(gBody)
    }).then(r=>{
      if(r.ok){
        const idx=googleTasks.findIndex(x=>x.id===t.gTaskId);
        if(idx>=0) Object.assign(googleTasks[idx],{title,notes:context,due:due?due+'T00:00:00.000Z':''});
      }
    }).catch(()=>{});
  }

  // Google Calendar event
  const syncCal = document.getElementById('gSyncCal');
  if(syncCal?.checked){
    const calId = document.getElementById('gSyncCalId')?.value;
    const calDate = document.getElementById('gSyncCalDate')?.value;
    const calStart = document.getElementById('gSyncCalStart')?.value || '09:00';
    const calEnd = document.getElementById('gSyncCalEnd')?.value || '10:00';
    if(calId && calDate && googleToken){
      const event = {summary:title, description:context||'', start:{dateTime:`${calDate}T${calStart}:00`, timeZone:'Europe/Madrid'}, end:{dateTime:`${calDate}T${calEnd}:00`, timeZone:'Europe/Madrid'}};
      fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events`,{
        method:'POST', headers:{Authorization:`Bearer ${googleToken}`,'Content-Type':'application/json'}, body:JSON.stringify(event)
      }).then(r=>r.ok?setStatus('Evento creado en Google Calendar.'):null).catch(()=>{});
    }
  }

  closeModal(); render();
  setStatus('Tarea guardada.');
}
function toggleSubtasksExpand(id,ev){
  if(ev) ev.stopPropagation();
  if(expandedSubtasks.has(id)) expandedSubtasks.delete(id); else expandedSubtasks.add(id);
  render();
}
function toggleSubtaskInline(taskId, subId){
  const t=state.tasks.find(x=>x.id===taskId); if(!t) return;
  const s=t.subtasks.find(x=>x.id===subId); if(!s) return;
  s.done = !s.done;
  saveTaskRow(t); render();
}
function toggleChildSubtaskInline(taskId, subId, childId){
  const t=state.tasks.find(x=>x.id===taskId); if(!t) return;
  const s=t.subtasks.find(x=>x.id===subId); if(!s || !s.children) return;
  const c=s.children.find(x=>x.id===childId); if(!c) return;
  c.done = !c.done;
  saveTaskRow(t); render();
}
function cycleUrgency(id,ev){
  if(ev) ev.stopPropagation();
  const t=state.tasks.find(x=>x.id===id);
  const order=['alta','media','baja'];
  t.urgency = order[(order.indexOf(t.urgency)+1)%3];
  saveTaskRow(t); render();
}
function toggleDone(id,ev){
  if(ev) ev.stopPropagation();
  const t=state.tasks.find(x=>x.id===id);
  t.status = t.status==='hecha'?'pendiente':'hecha';
  saveTaskRow(t); render();
}
function deleteTask(id,ev){
  if(ev) ev.stopPropagation();
  state.tasks=state.tasks.filter(t=>t.id!==id);
  deleteTaskRow(id); render();
}

function saveContact(contactId){
  const nombre=document.getElementById('cNombre').value.trim();

  const cargo=document.getElementById('cCargo').value.trim();

function restoreMeetingDraft(){
  const stash = meetingDraftStash;
  meetingDraftStash = null;
  tempParticipants = stash.participants.slice();
  const draftData = {
    title: stash.title, date: stash.date, importance: stash.importance,
    projectId: stash.projectId, summary: stash.summary, acuerdos: stash.acuerdos,

  };
  const editing = stash.meetingId ? state.meetings.find(m=>m.id===stash.meetingId) : null;

function deleteContact(contactId){

function renderParticipants(){

function quickAddContactFromParticipant(fullName){
  const titleEl=document.getElementById('rTitle');
  if(titleEl){
    meetingDraftStash = {
      meetingId: document.getElementById('modalRoot').dataset.meetingId || '',
      title: titleEl.value,
      date: document.getElementById('rDate').value,
      importance: document.getElementById('rImportance').value,
      projectId: document.getElementById('rProject').value,
      summary: document.getElementById('rSummary').value,
      acuerdos: document.getElementById('rAcuerdos').value,
      participants: tempParticipants.slice()
    };
  }
  const parts = fullName.trim().split(/\s+/);

function saveMeeting(meetingId){
  const title=document.getElementById('rTitle').value.trim();
  if(!title){ setStatus('El título no puede estar vacío.'); return; }
  const date=document.getElementById('rDate').value || todayStr();
  const importance=document.getElementById('rImportance').value;
  const projectId=document.getElementById('rProject').value || null;
  const summary=document.getElementById('rSummary').value.trim();
  const acuerdos=document.getElementById('rAcuerdos').value.trim();
  const participants=tempParticipants.slice();

  let m;
  if(meetingId){
    m=state.meetings.find(x=>x.id===meetingId);
    Object.assign(m,{title,date,importance,projectId,summary,acuerdos,participants});
  } else {
    m={id:uid(),title,date,importance,projectId,summary,acuerdos,participants};
    state.meetings.unshift(m);
  }
  tempParticipants=[];
  saveMeetingRow(m);
  closeModal(); render();

let currentContactId = null;
function openContactDetail(id){ currentContactId=id; render(); }
function closeContactDetail(){ currentContactId=null; render(); }

function renderCRM(){
  if(currentContactId){
    const c = state.contacts.find(x=>x.id===currentContactId);
    if(c) return renderContactDetail(c);
    currentContactId=null;
  }
  const rows = state.contacts.slice().sort((a,b)=>contactFullName(a).localeCompare(contactFullName(b)));
  const meetingCount = {};
  state.meetings.forEach(m=>(m.participants||[]).forEach(p=>{ meetingCount[p]=(meetingCount[p]||0)+1; }));
  const callCount = {};
  state.tasks.forEach(t=>{ if(t.tipo==='Llamada' && t.callWith) callCount[t.callWith]=(callCount[t.callWith]||0)+1; });

  const addBox = `
    <div class="view-header">
      <h2 style="font-size:14px;font-weight:600;color:var(--text);margin:0;">Contactos <span style="color:var(--text-muted);font-weight:400;">(${state.contacts.length})</span></h2>
      <button class="btn-primary btn-small" onclick="openContactModal(null)">+ Añadir</button>
    </div>`;

  if(rows.length===0) return addBox + '<p class="empty">No hay contactos todavía.</p>';

  const list = '<div class="card-grid">'+rows.map(c=>{
    const fn = contactFullName(c);
    const rc = meetingCount[fn] || 0;
    const cc = callCount[fn] || 0;
    const initials = fn.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
    return `
    <div class="crm-card" onclick="openContactDetail('${c.id}')" style="flex-direction:column;align-items:flex-start;gap:8px;">
      <div style="display:flex;align-items:center;gap:10px;width:100%;">
        <div class="crm-avatar">${escapeHtml(initials)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13.5px;font-weight:500;color:var(--text);">${escapeHtml(fn)}</div>
          <div style="font-size:11.5px;color:var(--text-soft);margin-top:2px;">${[c.cargo,c.empresa].filter(Boolean).map(escapeHtml).join(' · ')||'Sin cargo'}</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;font-size:11px;color:var(--text-muted);">
        <span><strong>${rc}</strong> reunión${rc!==1?'es':''}</span>
        <span><strong>${cc}</strong> llamada${cc!==1?'s':''}</span>
      </div>
    </div>`;
  }).join('')+'</div>';

  return addBox + list;
}

  const meetingsHtml = meetings.length ? meetings.map(m=>`
    <div class="task ${m.importance}" onclick="openMeetingModal('${m.id}')">
      <p class="task-title">${escapeHtml(m.title)}</p>
      <div class="task-meta">${fmtDate(m.date)}</div>
    </div>`).join('') : '<p class="empty">Sin reuniones registradas.</p>';

  const callsHtml = calls.length ? calls.map(t=>`
    <div class="task ${t.urgency} ${t.status==='hecha'?'done':''}" onclick="openTaskModal('${t.id}')">

function importBackup(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    restoreFromJSONText(reader.result);
    input.value='';
  };
  reader.readAsText(file);
}
function restoreFromJSONText(text){
  let data;
  try{
    const parsed = JSON.parse(text);
    data = parsed.data || parsed;
    if(!data.tasks || !Array.isArray(data.tasks)) throw new Error('Formato no reconocido');
  }catch(e){
    setStatus('El texto pegado no es una copia válida del gestor de tareas.');
    return;
  }
  showConfirm('Esto SUSTITUYE todo lo que hay ahora en el gestor de tareas por el contenido de la copia. ¿Continuar?', ()=>{
    state = Object.assign({notes:[],tasks:[],areas:DEFAULT_AREAS.slice(),tipos:DEFAULT_TIPOS.slice(),projects:[],meetings:[],contacts:[]}, data);
    state.tasks.forEach(t=>{ if(!t.subtasks) t.subtasks=[]; t.subtasks.forEach(s=>{ if(!s.children) s.children=[]; }); if(!t.linkedTaskIds) t.linkedTaskIds=[]; });
    state.projects.forEach(p=>{ if(!p.areas) p.areas=[]; if(!p.log) p.log=[]; if(p.active===undefined) p.active=true; });
    persistAll(); render();
    setStatus('Copia restaurada.');
  });
}
async function deleteAllRows(table){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=not.is.null`, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) setStatus('No se pudo limpiar una tabla antes de restaurar (HTTP '+res.status+').');
}
async function persistAll(){
  await Promise.all(['tasks','projects','meetings','contacts','notes'].map(deleteAllRows));
  await Promise.all([
    ...state.tasks.map(saveTaskRow),
    ...state.projects.map(saveProjectRow),
    ...state.meetings.map(saveMeetingRow),
    ...state.contacts.map(saveContactRow),
    ...state.notes.map(saveNoteRow),

  ]);
}

function copySummary(){
  const pending=state.tasks.filter(t=>t.status!=='hecha');
  const order={alta:0,media:1,baja:2};
  pending.sort((a,b)=>order[a.urgency]-order[b.urgency]||(a.due||'9999').localeCompare(b.due||'9999'));
  let text='Pendientes ('+new Date().toLocaleDateString('es-ES')+'):\n';
  pending.forEach(t=>{
    const areas=(t.areas||[]).join(', ');
    const pn=projName(t.projectId);
    text+='- ['+t.urgency.toUpperCase()+'] '+t.title+(t.tipo?' ('+t.tipo+')':'')+(pn?' — Proyecto: '+pn:'')+(areas?' — '+areas:'')+(t.due?' — vence '+fmtDateShort(t.due):'');
    if(t.subtasks && t.subtasks.length){
      const done=t.subtasks.filter(s=>s.done).length;
      text+=' — subtareas '+done+'/'+t.subtasks.length;
      t.subtasks.forEach(s=>{ text+='\n    '+(s.done?'[x] ':'[ ] ')+s.text; });
    }
    if(t.context) text+='\n    '+t.context.replace(/\n/g,'\n    ');
    text+='\n';
  });
  if(pending.length===0) text+='(nada pendiente)';
  const root=document.getElementById('modalRoot');
  root.innerHTML=`

      <div class="modal">
        <h3>Resumen de pendientes (selecciona y copia)</h3>

}

function scheduleTokenRefresh(expiresIn){
  if(_tokenRefreshTimer) clearTimeout(_tokenRefreshTimer);
  // Refrescar 5 minutos antes de que expire (el token dura 1h)
  const delay = Math.max((expiresIn - 300) * 1000, 10000);
  _tokenRefreshTimer = setTimeout(()=>{
    if(gTokenClient) gTokenClient.requestAccessToken({prompt:''});
  }, delay);
}

function _saveGoogleToken(t, expiry){
  googleToken = t; googleTokenExpiry = expiry;
  localStorage.setItem('g_tok', JSON.stringify({t, e: expiry}));
  localStorage.setItem('g_authorized', '1'); // marca: ya autorizó alguna vez
}

function initGoogleTokenClient(){
  if(typeof google === 'undefined' || !google.accounts) return;
  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPES,
    callback: async (resp) => {
      if(resp.error){
        // Si el refresco silencioso falla, no molestamos al usuario; simplemente desconectamos
        if(resp.error === 'interaction_required' || resp.error === 'access_denied'){
          googleToken=null; googleTokenExpiry=0; updateGoogleUI(); return;
        }
        setStatus('Error Google: '+resp.error); return;
      }
      _saveGoogleToken(resp.access_token, Date.now() + (resp.expires_in - 60)*1000);
      scheduleTokenRefresh(resp.expires_in);
      await fetchCalendarList();
      updateGoogleUI();
      fetchGmailLabels();
      refreshHeaderEvents();
      fetchGoogleTasks();
      if(currentView==='calendario'||currentView==='correo'){ render(); loadAgendaData(); }
    }
  });

  // Restaurar token guardado o intentar refresco silencioso si ya autorizó antes
  try{
    const s = JSON.parse(localStorage.getItem('g_tok')||'null');
    if(s && s.e > Date.now()){
      // Token todavía válido
      googleToken=s.t; googleTokenExpiry=s.e;
      scheduleTokenRefresh(Math.round((s.e - Date.now())/1000));
      fetchCalendarList().then(()=>{ updateGoogleUI(); fetchGmailLabels(); refreshHeaderEvents(); fetchGoogleTasks(); if(currentView==='calendario'||currentView==='correo'){ render(); loadAgendaData(); } });
    } else if(localStorage.getItem('g_authorized')==='1'){
      // Token expirado pero el usuario ya autorizó antes → refresco silencioso
      gTokenClient.requestAccessToken({prompt:''});
    }
  }catch(e){}
}
function connectGoogle(){
  if(!gTokenClient) initGoogleTokenClient();
  if(!gTokenClient){ setStatus('Librería de Google no cargada aún. Reintenta en un momento.'); return; }
  gTokenClient.requestAccessToken({prompt: googleToken?'':'consent'});
}
function disconnectGoogle(){
  if(_tokenRefreshTimer){ clearTimeout(_tokenRefreshTimer); _tokenRefreshTimer=null; }
  if(googleToken) try{ google.accounts.oauth2.revoke(googleToken,()=>{}); }catch(e){}
  googleToken=null; googleTokenExpiry=0; googleCalendars=[];
  localStorage.removeItem('g_tok');
  localStorage.removeItem('g_authorized');
  updateGoogleUI();
  if(currentView==='calendario'||currentView==='correo') render();
}
function updateGoogleUI(){
  const el=document.getElementById('googleAuthStatus'); if(!el) return;
  if(googleToken){
    el.innerHTML=`<p class="google-connected">✓ Conectado con Google</p>
      <button class="btn-ghost btn-small" style="margin-top:6px;" onclick="disconnectGoogle()">Desconectar</button>`;
  } else {
    el.innerHTML=`<button class="btn-ghost btn-small" onclick="connectGoogle()">🔗 Conectar con Google</button>`;
  }
  updateGoogleCalendarConfigUI();
}
function handleGoogleExpired(){
  googleToken=null; sessionStorage.removeItem('g_tok'); googleCalendars=[]; updateGoogleUI();
  setStatus('Sesión de Google expirada — vuelve a conectar.');
}
async function fetchCalendarList(){
  if(!googleToken) return;
  try{
    const r=await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList?maxResults=50',
      {headers:{Authorization:`Bearer ${googleToken}`}});

function renderCalMini(){

  const firstDay=new Date(yr,mo,1); const lastDay=new Date(yr,mo+1,0);
  let startDow=firstDay.getDay(); if(startDow===0) startDow=7; startDow--;
  const label=new Date(yr,mo,1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  let cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=lastDay.getDate();d++) cells.push(`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  while(cells.length%7!==0) cells.push(null);
  return `<div class="cal-mini">

  return{mon,sun};
}

  const content = calView==='month'
    ? `<div class="cal-grid" id="calMonthGrid"><div class="empty" style="grid-column:span 7;padding:16px;">Cargando...</div></div>`
    : `<div id="calViewContent"><p class="empty" style="padding:16px;">Cargando...</p></div>`;

  const sidebar=`<div class="cal-sidebar">

          <span class="cal-list-check${showCalLocalTasks?' on':''}" style="background:${showCalLocalTasks?'#7c3aed':'transparent'};border-color:#7c3aed;"></span>

  return `<div class="cal-layout">
    ${sidebar}
    <div class="cal-main">
      <div class="cal-nav">
        ${navMid}
        <div class="cal-view-tabs" style="margin-left:auto;">
          <button class="cal-view-tab ${calView==='day'?'active':''}" onclick="setCalView('day')">Día</button>
          <button class="cal-view-tab ${calView==='week'?'active':''}" onclick="setCalView('week')">Semana</button>
          <button class="cal-view-tab ${calView==='3week'?'active':''}" onclick="setCalView('3week')">3 Semanas</button>
          <button class="cal-view-tab ${calView==='month'?'active':''}" onclick="setCalView('month')">Mes</button>

          <button class="btn-primary btn-small" onclick="openCalEventModal(null)" style="gap:4px;"><i class="ti ti-plus"></i> Evento</button>
          <button class="btn-ghost btn-small" onclick="loadCalendarData()" title="Actualizar"><i class="ti ti-refresh"></i></button>
        </div>
      </div>
      <div id="agendaSyncBar" class="agenda-sync-bar" style="display:none;"></div>
      ${content}
    </div>
  </div>`;
}
function setCalView(v){ calView=v; calSelectedDay=null; if(v!=='month') calViewDate=new Date(); render(); loadCalendarData(); }
function changeCalMonth(delta){
  if(delta===0){ calViewMonth=new Date(); calMiniMonth=new Date(); }
  else{ calViewMonth=new Date(calViewMonth.getFullYear(),calViewMonth.getMonth()+delta,1); calMiniMonth=new Date(calViewMonth); }
  calSelectedDay=null; render(); loadCalendarMonth();
}
function changeCalDay(delta){
  if(delta===0){ calViewDate=new Date(); } else { const d=new Date(calViewDate); d.setDate(d.getDate()+delta); calViewDate=d; }
  render(); loadCalendarData();
}
function changeCalWeek(delta){
  if(delta===0){ calViewDate=new Date(); } else { const d=new Date(calViewDate); d.setDate(d.getDate()+delta*7); calViewDate=d; }
  render(); loadCalendarData();
}
async function loadCalendarData(){
  if(calView==='month'){ loadCalendarMonth(); return; }
  let tMin,tMax;
  if(calView==='day'){
    const d=new Date(calViewDate); d.setHours(0,0,0,0);
    tMin=d.toISOString();
    const end=new Date(d); end.setDate(d.getDate()+1);
    tMax=end.toISOString();
  } else if(calView==='3week'){
    const s=get3WeekStart(calViewDate);
    const e=new Date(s); e.setDate(s.getDate()+21); e.setHours(23,59,59,999);
    tMin=s.toISOString(); tMax=e.toISOString();
  } else {
    const {mon,sun}=getWeekRange(calViewDate);
    tMin=mon.toISOString(); tMax=sun.toISOString();
  }
  calMonthEvents=await fetchCalendarEvents(tMin,tMax);
  renderCalendarSelector();
  renderCalSidebarList();
  const el=document.getElementById('calViewContent'); if(!el) return;
  if(calView==='day') el.innerHTML=renderCalDayGrid();
  else if(calView==='3week') renderCal3WeekGrid();
  else el.innerHTML=renderCalWeekGrid();
}

  +overdueLTasks.map(t=>`<div class="ltask-day-row overdue" onclick="openTaskModal('${escapeAttr(t.id)}')">
    <div class="gtask-day-row-info">

  return overdueHtml+taskHtml+calMonthEvents.map(ev=>{

function renderCalWeekGrid(){
  const{mon}=getWeekRange(calViewDate);
  const today=todayStr();
  const byDay={};
  calMonthEvents.forEach(ev=>{
    const d=ev.start.dateTime?ev.start.dateTime.slice(0,10):ev.start.date;
    if(!byDay[d])byDay[d]=[]; byDay[d].push(ev);
  });
  const names=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const weekDays=Array.from({length:7},(_,i)=>{
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });

  // Spanning bars strip (all-day gcal events + multi-day tasks)
  const spanItems=[..._gcalAllDaySpans(calMonthEvents),..._ltaskSpans()].filter(it=>it.end>=weekDays[0]&&it.start<=weekDays[6]);
  const bars=_buildSpanBars(spanItems,weekDays);
  const maxLane=bars.length?Math.max(...bars.map(b=>b.lane)):0;
  const stripHtml=bars.length?`<div class="cal-week-allday-strip" style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));grid-auto-rows:22px;min-height:${maxLane*23+4}px;padding:2px 0;border-bottom:1px solid var(--border);">
    ${bars.map(b=>`<div class="cal-span-bar ${b.cls}" style="grid-column:${b.col}/span ${b.span};grid-row:${b.lane};background:${b.color};" onclick="${b.onClick}" title="${escapeHtml(b.label)}">${b.cBefore?'◀ ':''}${escapeHtml(b.label)}${b.cAfter?' ▶':''}</div>`).join('')}
  </div>`:'';

  const colsHtml=weekDays.map((ds,i)=>{
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const isT=ds===today;
    const evs=byDay[ds]||[];
    const evHtml=evs.filter(ev=>ev.start.dateTime).map(ev=>{
      const t=new Date(ev.start.dateTime).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      return `<div class="cal-week-event" style="background:${ev._calColor||'var(--accent)'};cursor:pointer;" onclick="event.stopPropagation();openCalEventModal('${escapeAttr(ev.id)}')">${t} ${escapeHtml(ev.summary||'')}</div>`;
    }).join('');
    // Only single-day tasks in column cells (multi-day ones are in the strip above)
    const colGTasks=showCalGTasks?googleTasks.filter(t=>t.due&&t.due.slice(0,10)===ds):[];
    const colLTasks=showCalLocalTasks?state.tasks.filter(t=>t.status!=='hecha'&&(!t.start||t.start===t.due)&&t.due===ds):[];
    const overdueGTasks=isT&&showCalGTasks?googleTasks.filter(t=>t.due&&t.due.slice(0,10)<today):[];
    const overdueLTasks=isT&&showCalLocalTasks?state.tasks.filter(t=>t.due&&t.due<today&&t.status!=='hecha'&&(!t.start||t.start===t.due)):[];
    const taskHtml=
       (showCalGTasks?colGTasks.map(t=>`<div class="gtask-cal-pill" onclick="event.stopPropagation();openGTaskModal('${escapeAttr(t._listId)}','${escapeAttr(t.id)}')">✓ ${escapeHtml(t.title||'')}</div>`).join(''):'')
      +(showCalLocalTasks?colLTasks.map(t=>`<div class="ltask-cal-pill ${t.urgency||''}" onclick="event.stopPropagation();openTaskModal('${escapeAttr(t.id)}')">● ${escapeHtml(t.title||'')}</div>`).join(''):'')
      +(showCalGTasks?overdueGTasks.map(t=>`<div class="gtask-cal-pill overdue" onclick="event.stopPropagation();openGTaskModal('${escapeAttr(t._listId)}','${escapeAttr(t.id)}')">⚠ ${escapeHtml(t.title||'')}</div>`).join(''):'')
      +(showCalLocalTasks?overdueLTasks.map(t=>`<div class="ltask-cal-pill ${t.urgency||''} overdue" onclick="event.stopPropagation();openTaskModal('${escapeAttr(t.id)}')">⚠ ${escapeHtml(t.title||'')}</div>`).join(''):'');
    return `<div class="cal-week-col">
      <div class="cal-week-col-head ${isT?'today-col':''}">
        <div class="cal-week-col-head-name">${names[i]}</div>
        <div class="cal-week-col-head-day">${d.getDate()}</div>
      </div>
      <div class="cal-week-col-body">${evHtml}${taskHtml}</div>
    </div>`;
  }).join('');

  return `<div style="display:flex;flex-direction:column;">${stripHtml}<div class="cal-week-grid">${colsHtml}</div></div>`;
}

function renderCal3WeekGrid(){
  const el=document.getElementById('calViewContent'); if(!el) return;
  const today=todayStr();
  const start=get3WeekStart(calViewDate);

  const byDay={};
  calMonthEvents.forEach(ev=>{
    const d=ev.start.dateTime?ev.start.dateTime.slice(0,10):ev.start.date;
    if(!byDay[d])byDay[d]=[]; byDay[d].push(ev);
  });
  const singleByDay={};
  if(showCalGTasks) googleTasks.filter(t=>t.due).forEach(t=>{
    const d=t.due.slice(0,10); if(!singleByDay[d])singleByDay[d]=[]; singleByDay[d].push({_type:'gtask',...t});
  });
  if(showCalLocalTasks) state.tasks.filter(t=>t.due&&t.status!=='hecha'&&(!t.start||t.start===t.due)).forEach(t=>{
    if(!singleByDay[t.due])singleByDay[t.due]=[]; singleByDay[t.due].push({_type:'ltask',...t});
  });

  const gcalSpans=_gcalAllDaySpans(calMonthEvents);
  const ltSpans=_ltaskSpans();
  const allSpanItems=[...gcalSpans,...ltSpans];

  const dowLabels=['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
  let html=`<div class="cal-grid">
    <div class="cal-dow-row">${dowLabels.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>`;

  for(let w=0;w<3;w++){
    const weekDays=[];
    for(let d=0;d<7;d++){
      const dt=new Date(start); dt.setDate(start.getDate()+w*7+d);
      weekDays.push(`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`);
    }
    const bars=_buildSpanBars(allSpanItems,weekDays);
    const spansHtml=_renderSpanBars(bars);
    const daysHtml=weekDays.map(ds=>{
      const isToday=ds===today;
      const evs=(byDay[ds]||[]).filter(ev=>ev.start.dateTime).sort((a,b)=>(a.start.dateTime<b.start.dateTime?-1:1));
      const tasks=singleByDay[ds]||[];
      // No MAX — show all events so cells auto-expand
      const evRows=evs.map(ev=>{
        const isMissing=_reunionesCal&&ev._calId===_reunionesCal.id&&_reunionesMissingIds.has(ev.id);
        const t=new Date(ev.start.dateTime).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
        return `<div class="cal-ev-row${isMissing?' missing-agenda':''}" onclick="event.stopPropagation();openCalEventModal('${escapeAttr(ev.id)}')">
          <span class="cal-ev-dot" style="background:${ev._calColor||'var(--accent)'};"></span>
          <span class="cal-ev-time">${t}</span>
          <span class="cal-ev-title">${isMissing?'⚠ ':''}${escapeHtml(ev.summary||'')}</span>
        </div>`;
      }).join('');
      const taskRows=tasks.map(t=>
        t._type==='gtask'
          ?`<div class="cal-ev-row" onclick="event.stopPropagation();openGTaskModal('${escapeAttr(t._listId)}','${escapeAttr(t.id)}')"><span class="cal-ev-dot" style="background:#1a73e8;"></span><span class="cal-ev-title">✓ ${escapeHtml(t.title||'')}</span></div>`
          :`<div class="cal-ev-row" onclick="event.stopPropagation();openTaskModal('${escapeAttr(t.id)}')"><span class="cal-ev-dot" style="background:#7c3aed;"></span><span class="cal-ev-title">${escapeHtml(t.title||'')}</span></div>`
      ).join('');
      const mo=new Date(ds+'T12:00:00').toLocaleDateString('es-ES',{month:'short'});
      return `<div class="cal-day${isToday?' today':''}" style="grid-row:2;min-height:140px;" data-date="${ds}" onclick="selectCalDay('${ds}')">
        <div class="cal-day-num"><span>${parseInt(ds.slice(8))}</span><span style="font-size:9px;color:var(--text-muted);margin-left:2px;">${mo}</span></div>
        ${evRows}${taskRows}
      </div>`;
    }).join('');
    html+=`<div class="cal-month-week">${spansHtml}${daysHtml}</div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

async function loadCalendarMonth(){
  const grid=document.getElementById('calMonthGrid'); if(!grid) return;
  const yr=calViewMonth.getFullYear(), mo=calViewMonth.getMonth();
  const tMin=new Date(yr,mo,1).toISOString();
  const tMax=new Date(yr,mo+1,0,23,59,59).toISOString();
  calMonthEvents = await fetchCalendarEvents(tMin, tMax);
  renderCalendarSelector();
  renderCalSidebarList();
  renderCalMonthGrid();
  checkAgendaDirectorSync(); // async, non-blocking
}

async function checkAgendaDirectorSync(){
  if(!googleToken || !googleCalendars.length) return;
  _reunionesCal  = googleCalendars.find(c=>c.summary?.toLowerCase().includes('reuniones'));
  _agendaDirCal  = googleCalendars.find(c=>c.summary?.toLowerCase().includes('agenda director'));
  if(!_reunionesCal || !_agendaDirCal){ _reunionesMissingIds=new Set(); updateAgendaSyncBar(); return; }

  const now=new Date();
  const tMin=now.toISOString();
  const tMax=new Date(now.getTime()+15*24*60*60*1000).toISOString();
  const fetchCal=async calId=>{
    try{
      const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?timeMin=${encodeURIComponent(tMin)}&timeMax=${encodeURIComponent(tMax)}&singleEvents=true&orderBy=startTime&maxResults=200`,
        {headers:{Authorization:`Bearer ${googleToken}`}});
      if(!r.ok) return [];
      return (await r.json()).items||[];
    }catch(e){ return []; }
  };
  [_reunionesEvents15, _agendaDirEvents15] = await Promise.all([fetchCal(_reunionesCal.id), fetchCal(_agendaDirCal.id)]);

  // Match by título normalizado + inicio (hasta minuto)
  const agendaKeys=new Set(_agendaDirEvents15.map(ev=>{
    const s=ev.start?.dateTime?.slice(0,16)||ev.start?.date||'';
    return (ev.summary||'').trim().toLowerCase()+'|'+s;
  }));
  _reunionesMissingIds=new Set();
  _reunionesEvents15.forEach(ev=>{
    const s=ev.start?.dateTime?.slice(0,16)||ev.start?.date||'';
    const key=(ev.summary||'').trim().toLowerCase()+'|'+s;
    if(!agendaKeys.has(key)) _reunionesMissingIds.add(ev.id);
  });
  updateAgendaSyncBar();
  renderCalMonthGrid(); // re-render para aplicar difuminado
}
